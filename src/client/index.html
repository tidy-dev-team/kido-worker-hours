<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת ניהול שעות</title>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="s-logo">
      <div class="s-logo-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5V8l2.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      <div><div class="s-logo-t">WorkHours</div><div class="s-logo-s">ניהול שעות</div></div>
    </div>
    <div class="s-nav">
      <div class="nav-item" id="nav-overview" onclick="navigate('overview')"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="5" height="2.5" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="5" width="5" height="2.5" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="5" height="2.5" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="9" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/></svg> מבט על</div>
      <div class="nav-item" id="nav-clients" onclick="navigate('clients')"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 13V6l5.5-4 5.5 4v7" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/><rect x="5.5" y="8.5" width="2.5" height="4.5" rx="0.5" fill="currentColor"/><rect x="3" y="7" width="2" height="2" rx="0.4" fill="currentColor"/><rect x="10" y="7" width="2" height="2" rx="0.4" fill="currentColor"/></svg> לקוחות</div>
      <div class="nav-item" id="nav-employees" onclick="navigate('employees')"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="5.5" cy="4" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1 13c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="11.5" cy="4.5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M13 13c0-2-1.2-3.2-3-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> עובדים</div>
      <div class="nav-item" id="nav-matrix" onclick="navigate('matrix')"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="7" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="7" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="7" y="7" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="13" width="4" height="1.5" rx="0.5" fill="currentColor"/><rect x="7" y="13" width="4" height="1.5" rx="0.5" fill="currentColor"/></svg> מטריצת הקצאות</div>
      <div class="nav-item" id="nav-weekly" onclick="navigate('weekly')"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 1v4M10 1v4M1 7h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3.5" y="9" width="2" height="2" rx="0.4" fill="currentColor"/><rect x="6.5" y="9" width="2" height="2" rx="0.4" fill="currentColor"/><rect x="9.5" y="9" width="2" height="2" rx="0.4" fill="currentColor"/></svg> סידור שבועי</div>
      <div style="height:1px;background:var(--border);margin:6px 4px"></div>
      <div class="nav-item" id="nav-settings" onclick="navigate('settings')"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 1.5v1.2M7.5 12.3v1.2M12.5 7.5h-1.2M3.7 7.5H2.5M10.95 4.05l-.85.85M4.9 10.1l-.85.85M10.95 10.95l-.85-.85M4.9 4.9l-.85-.85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> הגדרות</div>
    </div>
    <div class="s-month">
      <label>חודש:</label>
      <select id="month-select" onchange="onMonthChange(this.value)"></select>
      <button class="btn btn-p btn-sm" style="white-space:nowrap;flex-shrink:0" onclick="openNewMonthModal()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> חודש חדש</button>
    </div>
  </nav>
  <main id="main"><div id="page-content" class="page"></div></main>
</div>
<div id="modal-root"></div>
<script type="module" src="./main.js"></script>
</body>
</html>
