<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת ניהול שעות</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#da7756;--primary-dark:#c4614a;--primary-light:#fdf3f0;
  --success:#16a34a;--success-bg:#f0fdf4;--warning:#b45309;--warning-bg:#fffbeb;
  --danger:#dc2626;--danger-bg:#fef2f2;--info:#2563eb;
  --bg:#f7f5f2;--surface:#ffffff;--surface-2:#f4f2ee;--border:#e5e1da;--border-2:#d4cfc7;
  --text:#1a1917;--muted:#706f6c;--muted-2:#9c9894;
  --sb-bg:#1a1917;--sb-text:#e8e4dd;--sb-muted:#8a8785;--sb-hover:rgba(255,255,255,.07);--sb-active:rgba(255,255,255,.12);
  --topbar-h:54px;
  --r:8px;--r-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;min-height:100vh}
#sidebar{width:100%;height:var(--topbar-h);background:var(--sb-bg);color:var(--sb-text);display:flex;flex-direction:row;align-items:center;position:fixed;top:0;right:0;left:0;z-index:100;padding:0 20px;gap:4px}
#main{margin-top:var(--topbar-h);flex:1;overflow:auto}
.page{padding:28px 24px;max-width:1500px}
.s-logo{display:flex;align-items:center;gap:10px;padding:0 16px 0 0;border-left:1px solid rgba(255,255,255,.1);margin-left:4px;flex-shrink:0}
.s-logo-icon{width:30px;height:30px;background:var(--primary);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.s-logo-t{font-weight:700;font-size:14px;color:var(--sb-text);letter-spacing:-.01em}.s-logo-s{font-size:11px;color:var(--sb-muted);margin-top:1px}
.s-nav{display:flex;flex-direction:row;align-items:center;flex:1;gap:2px;padding:0 8px}
.s-sec{display:none}
.nav-item{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--sb-muted);transition:all .15s;font-size:13px;font-weight:500;white-space:nowrap}
.nav-item:hover{color:var(--sb-text);background:var(--sb-hover)}
.nav-item.active{color:#fff;background:var(--sb-active)}
.nav-item svg{flex-shrink:0;opacity:.8}
.nav-item.active svg{opacity:1}
.s-month{display:flex;align-items:center;gap:8px;padding:0 0 0 16px;border-right:1px solid rgba(255,255,255,.1);margin-right:4px;flex-shrink:0}
.s-month label{font-size:12px;color:var(--sb-muted);white-space:nowrap}
.s-month select{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--sb-text);border-radius:var(--r-sm);padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit;outline:none}
.s-month select option{background:var(--sb-bg);color:var(--sb-text)}
.s-month select:focus{border-color:rgba(218,119,86,.6)}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;position:relative;overflow:hidden}
.kpi-accent{position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 var(--r) var(--r) 0}
.kpi.p .kpi-accent{background:var(--primary)}.kpi.s .kpi-accent{background:var(--success)}.kpi.w .kpi-accent{background:var(--warning)}.kpi.d .kpi-accent{background:var(--danger)}
.kpi-lbl{font-size:12px;color:var(--muted);font-weight:500}
.kpi-val{font-size:28px;font-weight:700;margin:8px 0 4px;line-height:1;color:var(--text);letter-spacing:-.02em}
.kpi-sub{font-size:12px;color:var(--muted-2)}.kpi-ico{position:absolute;bottom:12px;left:14px;opacity:.07;color:var(--text)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--muted)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface-2);padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
tbody tr.emp-hidden td{opacity:.4;background:var(--surface)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.b-ret{background:#eff6ff;color:#2563eb}.b-proj{background:#f0fdf4;color:#16a34a}.b-int{background:#faf5ff;color:#7c3aed}
.b-ok{background:#f0fdf4;color:#16a34a}.b-warn{background:#fffbeb;color:#b45309}.b-danger{background:#fef2f2;color:#dc2626}.b-none{background:var(--surface-2);color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;line-height:1}
.btn-p{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-p:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn-s{background:var(--surface);color:var(--text);border-color:var(--border);box-shadow:var(--shadow)}.btn-s:hover{background:var(--surface-2);border-color:var(--border-2)}
.btn-d{background:var(--danger-bg);color:var(--danger);border-color:#fecaca}.btn-d:hover{background:#fee2e2;border-color:#fca5a5}
.btn-success{background:var(--success-bg);color:var(--success);border-color:#bbf7d0}.btn-success:hover{background:#dcfce7;border-color:#86efac}
.btn-sm{padding:5px 10px;font-size:12px}
.fg{margin-bottom:16px}.fl{display:block;font-size:12px;font-weight:500;margin-bottom:5px;color:var(--muted)}
.fi,.fs{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;background:var(--surface);color:var(--text);direction:rtl;font-family:inherit}
.fi:focus,.fs:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(218,119,86,.15)}
.fhint{font-size:11px;color:var(--muted-2);margin-top:4px}.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fIn .15s ease;backdrop-filter:blur(4px)}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:12px;border:1px solid var(--border);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:sUp .2s ease}
@keyframes sUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-t{font-size:16px;font-weight:600;color:var(--text)}.modal-bd{padding:20px 24px}
.modal-ft{padding:14px 24px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.mcell{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow)}
.mcell-lbl{background:var(--surface-2);padding:5px 8px;font-size:11px;color:var(--muted);font-weight:500;text-align:center;border-bottom:1px solid var(--border)}
.mcell-inp{width:100%;border:none;outline:none;text-align:center;padding:7px;font-size:13px;font-weight:600;background:var(--surface);color:var(--text);font-family:inherit}
.mcell-inp:focus{background:var(--primary-light);color:var(--primary)}
.apply-bar{display:flex;align-items:center;gap:10px;background:var(--warning-bg);border:1px solid #fde68a;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px}
.apply-bar input{width:80px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;text-align:center;font-weight:600;background:var(--surface);color:var(--text);font-family:inherit}
.mx-layout{display:block}
.mx-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;position:sticky;top:var(--topbar-h)}
.mx-sidebar-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mx-sidebar-title span{font-size:11px;color:var(--muted-2);font-weight:400}
.emp-check-item{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;transition:background .1s}
.emp-check-item:hover{background:var(--surface-2)}
.emp-check-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--primary)}
.emp-check-item.hidden-emp{color:var(--muted-2)}
.mx-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow);max-height:75vh;width:100%}
.mx-tbl{border-collapse:collapse;width:100%}
.mx-tbl th,.mx-tbl td{border:1px solid var(--border);white-space:nowrap}
.mx-th-emp{background:var(--surface-2);padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);text-align:right;min-width:155px;position:sticky;right:0;z-index:10;border-left:2px solid var(--border-2)}
.mx-th-c{background:var(--surface-2);padding:8px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:center;min-width:86px;max-width:108px}
.mx-th-tot{background:var(--primary-light);padding:8px 10px;font-size:11px;font-weight:600;color:var(--primary);text-align:center;min-width:98px}
.mx-td-emp{background:var(--surface-2);padding:10px 14px;font-size:13px;font-weight:600;position:sticky;right:0;z-index:5;border-left:2px solid var(--border-2)}
.mx-inp{width:100%;min-width:78px;border:none;outline:none;text-align:center;padding:10px 5px;font-size:13px;background:transparent;cursor:pointer;color:var(--text);font-family:inherit}
.mx-inp:focus{background:var(--primary-light);color:var(--primary)}
.mx-inp:disabled{color:var(--border-2);cursor:default;background:transparent}
.mx-td-tot{background:var(--primary-light);padding:10px 14px;font-size:13px;font-weight:700;color:var(--primary);text-align:center}
.mx-td-tot.over{color:var(--danger);background:var(--danger-bg)}
.mx-td-tot.ok{color:var(--success);background:var(--success-bg)}
.mx-c-tot td{background:var(--surface-2);padding:8px 14px;font-size:12px;font-weight:700;text-align:center;color:var(--muted)}
.emp-sub{font-size:11px;color:var(--muted-2);font-weight:400;margin-top:2px}
.distributing .mx-inp{animation:pulse .4s ease}
@keyframes pulse{0%{background:transparent}50%{background:rgba(218,119,86,.08)}100%{background:var(--primary-light)}}
.mcell-billed{width:100%;border:none;outline:none;text-align:center;padding:4px 5px;font-size:12px;background:var(--warning-bg);color:var(--warning);border-top:1px solid #fde68a;font-family:inherit}
.mcell-billed:focus{background:#fef3c7}
.mcell-billed::placeholder{color:#d4a843;opacity:1}
.bank-bar{display:flex;align-items:center;gap:8px;background:var(--success-bg);border:1px solid #bbf7d0;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;flex-wrap:wrap}
.pref-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-sm);padding:8px;margin-top:8px;background:var(--surface-2)}
.pref-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:4px 6px;border-radius:var(--r-sm)}
.pref-item:hover{background:var(--surface)}
.pref-item input{width:13px;height:13px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.mx-emp-tot{font-size:11px;font-weight:600;background:var(--primary-light);padding:3px 8px;border-radius:999px;color:var(--primary);white-space:nowrap}
.mx-emp-tot.over{background:var(--danger-bg);color:var(--danger)}
.pb-wrap{background:var(--surface-2);border-radius:999px;height:6px;overflow:hidden;border:1px solid var(--border)}
.pb{height:100%;border-radius:999px;transition:width .3s}
.pb-s{background:var(--success)}.pb-w{background:var(--warning)}.pb-d{background:var(--danger)}.pb-i{background:var(--primary)}
.progress{background:var(--surface-2);border-radius:999px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:999px;transition:width .3s}
.flex{display:flex}.items-c{align-items:center}.just-b{justify-content:space-between}.gap2{gap:8px}.gap3{gap:12px}
.mt4{margin-top:16px}.mb4{margin-bottom:16px}
.text-m{color:var(--muted)}.text-sm{font-size:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
.actions{display:flex;gap:4px}
.page-hd{margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.page-sub{color:var(--muted);margin-top:4px;font-size:13px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.danger-text{color:var(--danger);font-weight:600}.warn-text{color:var(--warning);font-weight:600}
.emp-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;display:flex;flex-direction:column}
.emp-card.emp-card-hidden{opacity:.4}
.emp-card-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:11px;border-bottom:1px solid var(--border);margin-bottom:11px}
.emp-card-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--muted)}
.emp-card-clients{flex:1;margin:8px 0;min-height:32px}
.emp-card-client-row{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-radius:var(--r-sm);font-size:12px}
.emp-card-client-row:nth-child(odd){background:var(--surface-2)}
.emp-card-ft{display:flex;gap:4px;margin-top:11px;padding-top:9px;border-top:1px solid var(--border)}
.weekly-emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.weekly-days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.weekly-day-cell{background:var(--surface-2);border-radius:var(--r-sm);padding:6px;min-height:64px;display:flex;flex-direction:column;gap:4px}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}
/* ── Insights page ── */
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.ins-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.ins-section-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ins-section-icon{width:28px;height:28px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ins-section-title{font-size:13px;font-weight:600;color:var(--text)}
.ins-section-sub{font-size:11px;color:var(--muted);margin-top:1px}
.ins-section-bd{padding:14px 18px}
.ins-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.ins-row:last-child{border-bottom:none}
.ins-row-name{flex:1;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ins-row-val{font-size:12px;font-weight:600;white-space:nowrap}
.ins-bar-wrap{flex:1;background:var(--surface-2);border-radius:999px;height:6px;overflow:hidden;border:1px solid var(--border)}
.ins-bar{height:100%;border-radius:999px;transition:width .4s}
.ins-alert{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:var(--r-sm);margin-bottom:8px;font-size:12.5px;line-height:1.5}
.ins-alert:last-child{margin-bottom:0}
.ins-alert.ok{background:var(--success-bg);border:1px solid #bbf7d0;color:#166534}
.ins-alert.warn{background:var(--warning-bg);border:1px solid #fde68a;color:#92400e}
.ins-alert.danger{background:var(--danger-bg);border:1px solid #fecaca;color:#991b1b}
.ins-alert.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a5f}
.ins-alert-icon{flex-shrink:0;margin-top:1px}
.ins-holiday-list{display:flex;flex-direction:column;gap:4px}
.ins-holiday{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:var(--r-sm);font-size:12px}
.ins-holiday.holiday{background:var(--danger-bg);color:#991b1b}
.ins-holiday.eve{background:var(--warning-bg);color:#92400e}
.ins-stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.ins-stat-row:last-child{border-bottom:none}
.ins-stat-val{font-weight:600;font-size:14px}
.ins-section-full{grid-column:1/-1}
.ins-section-2{grid-column:span 2}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}.mx-layout{grid-template-columns:1fr}.ins-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="s-logo">
      <div class="s-logo-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5V8l2.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      <div><div class="s-logo-t">WorkHours</div><div class="s-logo-s">ניהול שעות</div></div>
    </div>
    <div class="s-nav">

// ===================== HEBREW CALENDAR ENGINE =====================
function hIsLeap(y){return (7*y+1)%19<7;}
function hElapsed(y){const m=Math.floor((235*y-234)/19),p=12084+13753*m;let d=m*29+Math.floor(p/25920);if((3*(d+1))%7<3)d++;return d;}
function hYearLen(y){return hElapsed(y+1)-hElapsed(y);}
function hMonLen(m,y){if([1,3,5,7,11].includes(m))return 30;if([2,4,6,10].includes(m))return 29;if(m===8)return hYearLen(y)%10===5?30:29;if(m===9)return hYearLen(y)%10===3?29:30;if(m===12)return hIsLeap(y)?30:29;if(m===13)return 29;return 0;}
function hLastMon(y){return hIsLeap(y)?13:12;}
function gFixed(y,m,d){const y1=y-1;return 365*y1+Math.floor(y1/4)-Math.floor(y1/100)+Math.floor(y1/400)+Math.floor((367*m-362)/12)+(m<=2?0:(y%4===0&&(y%100!==0||y%400===0)?-1:-2))+d;}
function hFixed(hy,hm,hd){const epoch=-1373428;let f=epoch+hElapsed(hy)+hd-1;if(hm<7){for(let i=7;i<=hLastMon(hy);i++)f+=hMonLen(i,hy);for(let i=1;i<hm;i++)f+=hMonLen(i,hy);}else{for(let i=7;i<hm;i++)f+=hMonLen(i,hy);}return f;}
function fixedToStr(f){let y=Math.floor((f-1)/365.2425)+1;while(gFixed(y+1,1,1)<=f)y++;while(gFixed(y,1,1)>f)y--;const isLeap=y%4===0&&(y%100!==0||y%400===0);const md=isLeap?[0,31,29,31,30,31,30,31,31,30,31,30,31]:[0,31,28,31,30,31,30,31,31,30,31,30,31];let rem=f-gFixed(y,1,1)+1,mo=1;while(mo<12&&rem>md[mo]){rem-=md[mo];mo++;}return`${y}-${String(mo).padStart(2,'0')}-${String(rem).padStart(2,'0')}`;}
function hToStr(hy,hm,hd){return fixedToStr(hFixed(hy,hm,hd));}
function fixedDow(f){return((f%7)+7)%7;}

const _holidayCache={};
function getHolidays(gYear){
  if(_holidayCache[gYear])return _holidayCache[gYear];
  const res={};
  function add(s,name,type){if(s&&s.startsWith(String(gYear)))res[s]={name,type};}
  [gYear+3760,gYear+3761].forEach(hy=>{
    const adar=hIsLeap(hy)?13:12;
    add(hToStr(hy,adar,13),'ערב פורים','eve');
    add(hToStr(hy,adar,14),'פורים','holiday');
    add(hToStr(hy,1,14),'ערב פסח','eve');
    add(hToStr(hy,1,15),"פסח א'",'holiday');
    add(hToStr(hy,1,21),"פסח ז'",'holiday');
    // Yom HaAtzmaut with postponement rules
    const atzF=hFixed(hy,2,5),dow=fixedDow(atzF);
    const off=dow===6||dow===5?-2:dow===0?1:0;
    add(fixedToStr(atzF+off-2),'ערב יום הזיכרון','eve');
    add(fixedToStr(atzF+off-1),'יום הזיכרון','holiday');
    add(fixedToStr(atzF+off),'יום העצמאות','holiday');
    add(hToStr(hy,3,5),'ערב שבועות','eve');
    add(hToStr(hy,3,6),'שבועות','holiday');
    add(hToStr(hy,6,29),'ערב ראש השנה','eve');
    add(hToStr(hy,7,1),'ראש השנה','holiday');
    add(hToStr(hy,7,2),"ראש השנה ב'",'holiday');
    add(hToStr(hy,7,9),'ערב יום כיפור','eve');
    add(hToStr(hy,7,10),'יום כיפור','holiday');
    add(hToStr(hy,7,14),'ערב סוכות','eve');
    add(hToStr(hy,7,15),'סוכות','holiday');
    add(hToStr(hy,7,21),'הושענא רבה','eve');
    add(hToStr(hy,7,22),'שמיני עצרת','holiday');
  });
  _holidayCache[gYear]=res;
  return res;
}

// ===================== WORKING DAYS (א-ה, ללא שישי/שבת) =====================
function getWorkingDays(mk){
  const[y,m]=mk.split('-').map(Number);
  const last=new Date(y,m,0).getDate();
  let c=0;
  for(let d=1;d<=last;d++){const dow=new Date(y,m-1,d).getDay();if(dow!==5&&dow!==6)c++;}
  return c;
}
function calcMonthWorkDays(mk){
  const[y,m]=mk.split('-').map(Number);
  const last=new Date(y,m,0).getDate();
  let full=0,half=0,off=0;
  for(let d=1;d<=last;d++){
    const dow=new Date(y,m-1,d).getDay();
    if(dow===5||dow===6)continue;
    const key=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const h=getHolidays(y)[key];
    if(!h)full++;
    else if(h.type==='eve')half++;
    else off++;
  }
  return{full,half,off,effective:full+half*0.5};
}
function calcAutoHours(mk){
  if(state.monthSetup?.[mk]?.workDays!==undefined)return Math.round(state.monthSetup[mk].workDays*7);
  return Math.round(calcMonthWorkDays(mk).effective*7);
}
function calcAutoHoursForEmp(emp,mk){
  const scope=(emp.scope!=null?emp.scope:100)/100;
  return Math.round(calcAutoHours(mk)*scope);
}
function getEmpHours(emp,mk){
  const base=emp.monthlyHours?.[mk]!==undefined?emp.monthlyHours[mk]:calcAutoHoursForEmp(emp,mk);
  const scope=(emp.scope!=null?emp.scope:100)/100;
  const vacDays=(state.vacations?.[mk]?.[emp.id])||0;
  return Math.max(0,base-Math.round(vacDays*7*scope));
}
// Project hours bank helpers
function getRemainingBankBefore(client,mk){
  const consumed=Object.entries(client.billedHours||{})
    .filter(([m])=>m<mk)
    .reduce((s,[,v])=>s+(parseFloat(v)||0),0);
  return Math.max(0,(client.hoursBank||0)-consumed);
}
function getTotalBilled(client){
  return Object.values(client.billedHours||{}).reduce((s,v)=>s+(parseFloat(v)||0),0);
}
// Client hours: respects project bank depletion
function getClientHours(client,mk){
  if(!client.monthlyHours)return 0;
  const planned=client.monthlyHours[mk]!==undefined?client.monthlyHours[mk]
    :(client.defaultHours!==undefined?client.defaultHours:0);
  if(client.type==='project'&&client.hoursBank){
    return Math.min(planned,getRemainingBankBefore(client,mk));
  }
  return planned;
}

function getTotalAllocated(mk){
  const activeCids=new Set(state.clients.filter(c=>c.active!==false).map(c=>c.id));
  return Object.values(state.matrix[mk]||{}).reduce((s,ed)=>s+Object.entries(ed).reduce((a,[cid,v])=>a+(activeCids.has(cid)?parseFloat(v)||0:0),0),0);

function getEmpAllocated(eid,mk){

// ===================== OVERVIEW (merged dashboard + insights) =====================
function renderOverview(){
  const mk=state.currentMonth;
  const [yr,mo]=mk.split('-').map(Number);
  const ml=mkLabel(mk);
  const activeEmps=state.employees.filter(e=>!e.hidden);
  const visEmps=state.employees.filter(e=>e.visible!==false).length;
  const visClients=state.clients.filter(c=>c.active!==false&&c.type!=='internal');

  // ── Totals ──
  const totalC=state.clients.filter(c=>c.active!==false).reduce((s,c)=>s+(getClientHours(c,mk)||0),0);
  const totalCap=activeEmps.reduce((s,e)=>s+getEmpHours(e,mk),0);
  const totalAlloc=getTotalAllocated(mk);
  const utilPct=totalCap>0?Math.round(totalAlloc/totalCap*100):0;
  const gap=totalCap-totalC;
  const capColor=utilPct>100?'var(--danger)':utilPct>=80?'var(--success)':utilPct>=50?'var(--warning)':'var(--muted)';

  // ── Work days & holidays ──
  const wd=calcMonthWorkDays(mk);
  const holidays=getHolidays(yr);
  const monthHols=Object.entries(holidays).filter(([d])=>d.startsWith(mk)).sort(([a],[b])=>a.localeCompare(b));
  const hoursLost=Math.round(wd.off*7+wd.half*3.5);

  // ── Employee utilization ──
  const empUtils=activeEmps.map(e=>{
    const cap=getEmpHours(e,mk),alloc=getEmpAllocated(e.id,mk);
    const pct=cap>0?Math.round(alloc/cap*100):0;
    const vac=(state.vacations?.[mk]?.[e.id])||0;
    return{e,cap,alloc,pct,vac};
  }).sort((a,b)=>b.pct-a.pct);

  // ── Client coverage ──
  const clientCov=visClients.map(c=>{
    const planned=getClientHours(c,mk),alloc=getClientAllocated(c.id,mk);
    const pct=planned>0?Math.round(alloc/planned*100):null;
    return{c,planned,alloc,pct};
  }).filter(x=>x.planned>0).sort((a,b)=>(a.pct??0)-(b.pct??0));

  // ── Vacations ──
  const vacData=activeEmps.map(e=>({e,days:(state.vacations?.[mk]?.[e.id])||0})).filter(x=>x.days>0).sort((a,b)=>b.days-a.days);
  const totalVacDays=vacData.reduce((s,x)=>s+x.days,0);

  // ── Project bank ──
  const projAlerts=state.clients.filter(c=>c.active!==false&&c.type==='project'&&c.hoursBank).map(c=>{
    const totalBilled=getTotalBilled(c);
    const pct=c.hoursBank>0?Math.round(totalBilled/c.hoursBank*100):0;
    return{c,remaining:getRemainingBankBefore(c,mk),pct,totalBilled};
  }).sort((a,b)=>a.pct-b.pct);

  // ── Alerts ──
  const alerts=[];
  const over=empUtils.filter(x=>x.pct>100);
  const under=empUtils.filter(x=>x.pct<50&&x.cap>0);
  const noAlloc=empUtils.filter(x=>x.alloc===0&&x.cap>0);
  if(over.length)alerts.push({type:'danger',icon:'⚡',text:`${over.map(x=>x.e.name).join(', ')} — מוקצים מעל קיבולת (${over.map(x=>x.pct+'%').join(', ')})`});
  if(noAlloc.length)alerts.push({type:'warn',icon:'○',text:`${noAlloc.map(x=>x.e.name).join(', ')} — אין הקצאות לחודש`});
  if(under.length&&!noAlloc.find(x=>under.find(y=>y.e.id===x.e.id)))alerts.push({type:'info',icon:'↓',text:`${under.map(x=>x.e.name).join(', ')} — ניצולת נמוכה (מתחת ל-50%)`});
  const uncoveredClients=clientCov.filter(x=>x.alloc===0);
  if(uncoveredClients.length)alerts.push({type:'warn',icon:'!',text:`לקוחות ללא כיסוי: ${uncoveredClients.map(x=>x.c.name).join(', ')}`});
  const lowBank=projAlerts.filter(x=>x.remaining<20&&x.remaining>0);
  if(lowBank.length)alerts.push({type:'danger',icon:'⚠',text:`בנק שעות נמוך: ${lowBank.map(x=>`${x.c.name} (נותר ${x.remaining}h)`).join(', ')}`});
  if(utilPct>=90&&utilPct<=100)alerts.push({type:'ok',icon:'✓',text:`ניצולת מצוינת — ${utilPct}% מהקיבולת מנוצלת`});
  if(hoursLost>0)alerts.push({type:'info',icon:'📅',text:`${monthHols.filter(([,v])=>v.type==='holiday').length} חגים החודש — ${hoursLost}h נגרעות מהקיבולת`});
  if(totalVacDays>0)alerts.push({type:'info',icon:'🏖',text:`סה״כ ${totalVacDays} ימי חופשה לצוות`});
  if(!alerts.length)alerts.push({type:'ok',icon:'✓',text:'הכל תקין — אין התרעות לחודש זה'});

  // ── Helpers ──
  function utilBar(pct){
    const w=Math.min(pct,100);
    const col=pct>100?'var(--danger)':pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--muted-2)';
    return `<div class="ins-bar-wrap"><div class="ins-bar" style="width:${w}%;background:${col}"></div></div>`;
  }
  function utilBadge(pct){
    const col=pct>100?'b-danger':pct>=80?'b-ok':pct>=50?'b-warn':'b-none';
    return `<span class="badge ${col}">${pct}%</span>`;
  }

  // ── Client status table ──
  const clientRows=state.clients.map(c=>{
    const cont=getClientHours(c,mk),alloc=getClientAllocated(c.id,mk),diff=alloc-cont;
    let status='<span class="badge b-none">— אין</span>';
    if(cont>0&&alloc>=cont)status='<span class="badge b-ok">✓ מכוסה</span>';
    else if(cont>0&&alloc>0)status='<span class="badge b-warn">⚠ חלקי</span>';
    else if(cont>0)status='<span class="badge b-danger">✗ ריק</span>';
    const diffHtml=diff===0?'—':`<span style="color:${diff>0?'var(--danger)':'var(--warning)'}">${diff>0?'+':''}${diff}</span>`;
    return `<tr><td><strong>${c.name}</strong></td><td>${clientTypeBadge(c.type)}</td><td>${cont}</td><td>${alloc}</td><td>${diffHtml}</td><td>${status}</td></tr>`;
  }).join('');

  // ── Trend comparison ──
  const prevIdx=(state.activeMonths||[]).indexOf(mk)-1;
  const prevMk=prevIdx>=0?(state.activeMonths||[])[prevIdx]:null;
  let trendSection='';
  if(prevMk){
    const prevAlloc=getTotalAllocated(prevMk);
    const prevCap=activeEmps.reduce((s,e)=>s+getEmpHours(e,prevMk),0);
    const prevUtil=prevCap>0?Math.round(prevAlloc/prevCap*100):0;
    const diff=utilPct-prevUtil;
    const diffStr=diff>0?`+${diff}%`:diff<0?`${diff}%`:'ללא שינוי';
    const diffCol=diff>0?'var(--success)':diff<0?'var(--danger)':'var(--muted)';
    trendSection=`<div class="ins-section">
      <div class="ins-section-hd">
        <div class="ins-section-icon" style="background:#eff6ff"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 10.5L5 6l3 2.5L12 2.5" stroke="#2563eb" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
        <div><div class="ins-section-title">השוואה לחודש קודם</div><div class="ins-section-sub">${mkLabel(prevMk)}</div></div>
      </div>
      <div class="ins-section-bd">
        <div class="ins-stat-row"><span style="color:var(--muted)">ניצולת נוכחי</span><span class="ins-stat-val">${utilPct}%</span></div>
        <div class="ins-stat-row"><span style="color:var(--muted)">ניצולת קודם</span><span class="ins-stat-val">${prevUtil}%</span></div>
        <div class="ins-stat-row"><span style="color:var(--muted)">שינוי</span><span class="ins-stat-val" style="color:${diffCol}">${diffStr}</span></div>
        <div class="ins-stat-row"><span style="color:var(--muted)">הקצאות קודם</span><span class="ins-stat-val">${prevAlloc}h</span></div>
      </div>
    </div>`;
  }

  return `
  <div class="page-hd flex items-c just-b">
    <div><div class="page-title">מבט על</div><div class="page-sub">${ml} | ${visEmps} עובדים פעילים · ${clientCov.length} לקוחות עם שעות</div></div>
  </div>

  <!-- Alerts bar -->
  <div style="margin-bottom:20px">
    ${alerts.map(a=>`<div class="ins-alert ${a.type}" style="margin-bottom:6px"><span class="ins-alert-icon">${a.icon}</span><span>${a.text}</span></div>`).join('')}
  </div>

  <!-- KPIs: 6 cards -->
  <div class="kpi-grid" style="grid-template-columns:repeat(6,1fr);margin-bottom:24px">
    <div class="kpi p"><div class="kpi-accent"></div><div class="kpi-lbl">שעות לקוחות</div><div class="kpi-val">${totalC.toLocaleString()}</div><div class="kpi-sub">סה״כ מוזמן</div><div class="kpi-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M3 21V7l7-4 7 4v14" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="13" width="3" height="8" rx="0.5" fill="currentColor"/></svg></div></div>
    <div class="kpi s"><div class="kpi-accent"></div><div class="kpi-lbl">קיבולת עובדים</div><div class="kpi-val">${totalCap.toLocaleString()}</div><div class="kpi-sub">סה״כ זמין</div><div class="kpi-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M2 21c0-4 3-7 7-7s7 3 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div></div>
    <div class="kpi ${utilPct>100?'d':utilPct>80?'w':'s'}"><div class="kpi-accent"></div><div class="kpi-lbl">ניצולת</div><div class="kpi-val" style="color:${capColor}">${utilPct}%</div><div class="kpi-sub">${totalAlloc}h מוקצות</div><div class="kpi-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><polyline points="3,17 8,11 13,14 21,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    <div class="kpi ${gap<0?'d':'w'}"><div class="kpi-accent"></div><div class="kpi-lbl">פער קיבולת</div><div class="kpi-val">${gap>0?'+':''}${gap}</div><div class="kpi-sub">${gap>=0?'עודף':'חסר'}</div><div class="kpi-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M13 3L21 12 13 21M3 12h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    <div class="kpi w"><div class="kpi-accent"></div><div class="kpi-lbl">ימי עבודה</div><div class="kpi-val">${wd.effective}</div><div class="kpi-sub">${wd.off} חגים · ${wd.half} ערבי חג</div><div class="kpi-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 2v3M16 2v3M3 9h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div></div>
    <div class="kpi ${totalVacDays>0?'w':'s'}"><div class="kpi-accent"></div><div class="kpi-lbl">ימי חופשה</div><div class="kpi-val">${totalVacDays}</div><div class="kpi-sub">${vacData.length} עובדים</div><div class="kpi-ico"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M17 8C17 11.3137 14.3137 14 11 14C7.68629 14 5 11.3137 5 8C5 4.68629 7.68629 2 11 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M19 2L19 8L13 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 22C3 19 6 17 11 17C16 17 19 19 19 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div></div>
  </div>

  <!-- 3 charts -->
  <div class="chart-grid" style="grid-template-columns:2fr 1fr 2fr;margin-bottom:24px">
    <div class="chart-card"><div class="chart-title">שעות לקוח — מוזמן vs. מוקצה</div><canvas id="ch-alloc" height="220"></canvas></div>
    <div class="chart-card" style="display:flex;flex-direction:column;align-items:center">
      <div class="chart-title" style="align-self:flex-start">לפי סוג לקוח</div>
      <canvas id="ch-type" width="200" height="200" style="max-width:200px;margin:auto"></canvas>
    </div>
    <div class="chart-card"><div class="chart-title">מגמה חודשית — שעות</div><canvas id="ch-trend" height="220"></canvas></div>
  </div>

  <!-- Insight sections grid -->
  <div class="ins-grid" style="margin-bottom:24px">
    <!-- Employee utilization -->
    <div class="ins-section">
      <div class="ins-section-hd">
        <div class="ins-section-icon" style="background:#eff6ff"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="3.5" r="2.5" stroke="#2563eb" stroke-width="1.3"/><path d="M1 12c0-2 1.8-3.5 4-3.5s4 1.5 4 3.5" stroke="#2563eb" stroke-width="1.3" stroke-linecap="round"/><path d="M10.5 5.5v4M8.5 7.5h4" stroke="#2563eb" stroke-width="1.3" stroke-linecap="round"/></svg></div>
        <div><div class="ins-section-title">ניצולת עובדים</div><div class="ins-section-sub">הקצאות מול קיבולת</div></div>
      </div>
      <div class="ins-section-bd">
        ${empUtils.map(({e,cap,alloc,pct,vac})=>`
          <div class="ins-row">
            <div class="ins-row-name">${e.name}${vac>0?`<span style="font-size:10px;color:var(--muted);margin-right:4px">(${vac}d)</span>`:''}</div>
            ${utilBar(pct)}
            <div class="ins-row-val" style="min-width:60px;text-align:left">${utilBadge(pct)}</div>
            <div style="font-size:11px;color:var(--muted);min-width:60px;text-align:left">${alloc}/${cap}h</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Client coverage -->
    <div class="ins-section">
      <div class="ins-section-hd">
        <div class="ins-section-icon" style="background:#f0fdf4"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 12V5.5l5-3.5 5 3.5V12" stroke="#16a34a" stroke-width="1.3" fill="none" stroke-linejoin="round"/><rect x="5" y="7.5" width="2.5" height="4.5" rx="0.5" fill="#16a34a"/></svg></div>
        <div><div class="ins-section-title">כיסוי לקוחות</div><div class="ins-section-sub">הקצאות מול תכנון</div></div>
      </div>
      <div class="ins-section-bd">
        ${clientCov.length===0?`<div style="font-size:13px;color:var(--muted);padding:8px 0">אין לקוחות עם שעות מתוכננות</div>`:''}
        ${clientCov.map(({c,planned,alloc,pct})=>`
          <div class="ins-row">
            <div class="ins-row-name">${c.name}</div>
            ${utilBar(pct??0)}
            <div class="ins-row-val" style="min-width:60px;text-align:left">${utilBadge(pct??0)}</div>
            <div style="font-size:11px;color:var(--muted);min-width:60px;text-align:left">${alloc}/${planned}h</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Holidays -->
    <div class="ins-section">
      <div class="ins-section-hd">
        <div class="ins-section-icon" style="background:#faf5ff"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="9" rx="1.5" stroke="#7c3aed" stroke-width="1.3"/><path d="M5 2v2M9 2v2M2 6.5h10" stroke="#7c3aed" stroke-width="1.3" stroke-linecap="round"/></svg></div>
        <div><div class="ins-section-title">חגים ומועדים</div><div class="ins-section-sub">${hoursLost}h נגרעות מהקיבולת</div></div>
      </div>
      <div class="ins-section-bd">
        ${monthHols.length===0?`<div style="font-size:13px;color:var(--muted);padding:8px 0">אין חגים בחודש זה</div>`:''}
        <div class="ins-holiday-list">
          ${monthHols.map(([d,h])=>`
            <div class="ins-holiday ${h.type}">
              <span>${h.name}</span>
              <span style="font-size:11px;font-weight:600">${d.slice(8)} ב${['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][mo-1]}</span>
            </div>`).join('')}
        </div>
        ${monthHols.length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:16px">
          <span style="font-size:12px;color:var(--muted)"><span style="font-weight:600;color:var(--text)">${wd.off}</span> חגים מלאים</span>
          <span style="font-size:12px;color:var(--muted)"><span style="font-weight:600;color:var(--text)">${wd.half}</span> ערבי חג</span>
        </div>`:''}
      </div>
    </div>

    <!-- Vacations -->
    <div class="ins-section">
      <div class="ins-section-hd">
        <div class="ins-section-icon" style="background:#fff7ed"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5C4 1.5 2 4 2 6.5c0 3 2 5.5 5 6 3-.5 5-3 5-6 0-2.5-2-5-5-5z" stroke="#ea580c" stroke-width="1.3"/><path d="M7 4v3.5l2 1" stroke="#ea580c" stroke-width="1.3" stroke-linecap="round"/></svg></div>
        <div><div class="ins-section-title">חופשות עובדים</div><div class="ins-section-sub">סה״כ ${totalVacDays} ימים</div></div>
      </div>
      <div class="ins-section-bd">
        ${vacData.length===0?`<div style="font-size:13px;color:var(--muted);padding:8px 0">אין חופשות מוזנות</div>`:''}
        ${vacData.map(({e,days})=>`
          <div class="ins-row">
            <div class="ins-row-name">${e.name}</div>
            <div style="flex:1;font-size:12px;color:var(--muted)">${days} ימים</div>
            <div class="ins-row-val" style="color:var(--warning)">−${Math.round(days*7*(e.scope??100)/100)}h</div>
          </div>`).join('')}
      </div>
    </div>

    ${projAlerts.length>0?`
    <!-- Project bank -->
    <div class="ins-section">
      <div class="ins-section-hd">
        <div class="ins-section-icon" style="background:#f0fdf4"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="4" width="11" height="8" rx="1.5" stroke="#16a34a" stroke-width="1.3"/><path d="M4.5 4V3a2.5 2.5 0 015 0v1" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round"/><path d="M7 7.5v1.5" stroke="#16a34a" stroke-width="1.3" stroke-linecap="round"/></svg></div>
        <div><div class="ins-section-title">בנק שעות פרויקטים</div><div class="ins-section-sub">מעקב צריכה</div></div>
      </div>
      <div class="ins-section-bd">
        ${projAlerts.map(({c,remaining,pct})=>`
          <div class="ins-row">
            <div class="ins-row-name">${c.name}</div>
            <div class="ins-bar-wrap" style="flex:1"><div class="ins-bar" style="width:${Math.min(pct,100)}%;background:${pct>80?'var(--danger)':pct>50?'var(--warning)':'var(--success)'}"></div></div>
            <div class="ins-row-val" style="min-width:60px;text-align:left;color:${remaining<20?'var(--danger)':'var(--muted)'}">נותר ${remaining}h</div>
          </div>`).join('')}
      </div>
    </div>`:''}

    ${trendSection}
  </div>

  <!-- Business insights -->
  ${generateBizInsights(mk)}

  <!-- Client status table -->
  <div class="card">
    <div class="card-hd"><div class="card-title">סטטוס לקוחות — ${ml}</div></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>לקוח</th><th>סוג</th><th>מוזמן</th><th>מוקצה</th><th>פער</th><th>סטטוס</th></tr></thead>
      <tbody>${clientRows}</tbody>
    </table></div>
  </div>`;
}

// ===================== BUSINESS INSIGHTS ENGINE =====================
function generateBizInsights(mk){
  const allMonths=[...(state.activeMonths||[mk])].sort();
  const currentIdx=allMonths.indexOf(mk);
  if(currentIdx<0)return'';
  const histMonths=allMonths.slice(Math.max(0,currentIdx-5),currentIdx+1);
  const prevMonths=histMonths.slice(0,-1);

  const activeEmps=state.employees.filter(e=>!e.hidden);
  const visClients=state.clients.filter(c=>c.active!==false&&c.type!=='internal');

  const mStats=histMonths.map(m=>{
    const cap=activeEmps.reduce((s,e)=>s+getEmpHours(e,m),0);
    const alloc=getTotalAllocated(m);
    const contracted=state.clients.reduce((s,c)=>s+(getClientHours(c,m)||0),0);
    const util=cap>0?Math.round(alloc/cap*100):0;
    return{m,cap,alloc,contracted,util};
  });
  const curr=mStats[mStats.length-1];

  function card(sev,icon,title,body,meta=''){
    const border=sev==='danger'?'#f85149':sev==='warn'?'#d29922':sev==='ok'?'#3fb950':'#58a6ff';
    const iconCol=border;
    return `<div style="background:var(--surface);border:1px solid var(--border);border-right:3px solid ${border};border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="color:${iconCol};font-size:15px;line-height:1;font-weight:700">${icon}</span>
        <span style="font-weight:600;font-size:13px;color:var(--text);flex:1">${title}</span>
        ${meta?`<span style="font-size:10px;color:var(--muted);white-space:nowrap;background:var(--surface-2);padding:2px 6px;border-radius:10px">${meta}</span>`:''}
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.65">${body}</div>
    </div>`;
  }

  if(histMonths.length<2)return`<div style="margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2a5.5 5.5 0 100 11A5.5 5.5 0 007.5 2z" stroke="var(--primary)" stroke-width="1.4"/><path d="M7.5 5.5v3M7.5 10v.5" stroke="var(--primary)" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span style="font-weight:700;font-size:14px">תובנות עסקיות</span>
    </div>
    <div style="font-size:12px;color:var(--muted);padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)">נדרשים לפחות 2 חודשים פעילים לייצור תובנות היסטוריות.</div>
  </div>`;

  const insights=[];
  const utils=mStats.map(s=>s.util);
  const avgUtil=Math.round(utils.reduce((s,x)=>s+x,0)/utils.length);
  const sparkline=mStats.map(s=>`<span style="color:${s.util>=80?'var(--success)':s.util>=50?'var(--warning)':'var(--danger)'}">${mkLabel(s.m).split(' ')[0]} ${s.util}%</span>`).join('<span style="color:var(--border);padding:0 4px">›</span>');

  // ── 1. Utilization trend ──
  const trendDelta=utils.length>=3?utils[utils.length-1]-utils[utils.length-3]:utils[utils.length-1]-utils[0];
  if(trendDelta>=10){
    insights.push(card('ok','↑','ניצולת בעלייה עקבית',`שיפור של <strong>+${trendDelta} נק'</strong> ב-${histMonths.length} חודשים — הצוות נהיה עמוס יותר ביחס לקיבולתו.<br>${sparkline}`,`ממוצע ${avgUtil}%`));
  }else if(trendDelta<=-10){
    insights.push(card('danger','↓','ניצולת בירידה',`ירידה של <strong>${trendDelta} נק'</strong> — ייתכן אובדן לקוחות, הגדלת צוות ללא ביקוש מקביל, או חודשי חגים.<br>${sparkline}`,`ממוצע ${avgUtil}%`));
  }else{
    insights.push(card('info','→','ניצולת יציבה',`נע בין <strong>${Math.min(...utils)}%–${Math.max(...utils)}%</strong> לאורך ${histMonths.length} חודשים — אין שינוי מגמה משמעותי.<br>${sparkline}`,`ממוצע ${avgUtil}%`));
  }

  // ── 2. Capacity pressure ──
  const highPressureN=mStats.filter(s=>s.util>=90).length;
  const lowUtilN=mStats.filter(s=>s.util<60).length;
  if(highPressureN>=2){
    insights.push(card('danger','🔥','לחץ מתמשך על קיבולת הצוות',`ניצולת מעל 90% ב-<strong>${highPressureN} מתוך ${histMonths.length} חודשים</strong>. פעולה בקיבולת קיצון לאורך זמן גוררת שחיקה ופגיעה באיכות. מומלץ לשקול גיוס.`,`${highPressureN}/${histMonths.length} חודשים`));
  }else if(lowUtilN>=2){
    insights.push(card('warn','○','קיבולת עודפת לאורך זמן',`ניצולת מתחת ל-60% ב-<strong>${lowUtilN} מתוך ${histMonths.length} חודשים</strong>. יש עודף כוח אדם ביחס לביקוש — בדוק פוטנציאל הרחבת מעגל לקוחות.`,`${lowUtilN}/${histMonths.length} חודשים`));
  }

  // ── 3. Employee burnout risk ──
  const burnoutEmps=activeEmps.filter(e=>{
    return histMonths.filter(m=>{const cap=getEmpHours(e,m),alloc=getEmpAllocated(e.id,m);return cap>0&&alloc/cap>=0.9;}).length>=2;
  });
  if(burnoutEmps.length){
    insights.push(card('danger','⚡','סיכון שחיקת עובדים',burnoutEmps.map(e=>{
      const n=histMonths.filter(m=>{const cap=getEmpHours(e,m),alloc=getEmpAllocated(e.id,m);return cap>0&&alloc/cap>=0.9;}).length;
      const avgPct=Math.round(histMonths.reduce((s,m)=>{const cap=getEmpHours(e,m),alloc=getEmpAllocated(e.id,m);return s+(cap>0?alloc/cap*100:0);},0)/histMonths.length);
      return `<strong>${e.name}</strong> — מעל 90% ב-${n}/${histMonths.length} חודשים (ממוצע ${avgPct}%)`;
    }).join('<br>'),`${burnoutEmps.length} עובד${burnoutEmps.length>1?'ים':''}`));
  }

  // ── 4. Chronic under-utilization ──
  const underEmps=activeEmps.filter(e=>{
    return histMonths.filter(m=>{const cap=getEmpHours(e,m),alloc=getEmpAllocated(e.id,m);return cap>0&&alloc/cap<0.5;}).length>=2;
  });
  if(underEmps.length){
    insights.push(card('warn','↓','ניצולת נמוכה עקבית',underEmps.map(e=>{
      const avgPct=Math.round(histMonths.reduce((s,m)=>{const cap=getEmpHours(e,m),alloc=getEmpAllocated(e.id,m);return s+(cap>0?alloc/cap*100:0);},0)/histMonths.length);
      return `<strong>${e.name}</strong> — ממוצע ${avgPct}% ב-${histMonths.length} חודשים`;
    }).join('<br>'),`${underEmps.length} עובד${underEmps.length>1?'ים':''}`));
  }

  // ── 5. Client churn risk ──
  const churnClients=visClients.filter(c=>{
    const relevantMonths=histMonths.filter(m=>getClientHours(c,m)>0);
    if(relevantMonths.length<2)return false;
    const badN=relevantMonths.filter(m=>{const p=getClientHours(c,m);return p&&getClientAllocated(c.id,m)/p<0.5;}).length;
    return badN>=2&&getClientHours(c,mk)>0;
  });
  if(churnClients.length){
    insights.push(card('danger','!','לקוחות בסיכון אובדן',churnClients.map(c=>{
      const rel=histMonths.filter(m=>getClientHours(c,m)>0);
      const avgPct=Math.round(rel.reduce((s,m)=>{const p=getClientHours(c,m);return s+(p?getClientAllocated(c.id,m)/p*100:0);},0)/rel.length);
      return `<strong>${c.name}</strong> — ממוצע אספקה ${avgPct}% בלבד (${rel.length} חודשים)`;
    }).join('<br>'),`${churnClients.length} לקוח${churnClients.length>1?'ות':''}`));
  }

  // ── 6. Scope creep ──
  const scopeClients=visClients.filter(c=>{
    const rel=histMonths.filter(m=>getClientHours(c,m)>0);
    if(rel.length<2)return false;
    return rel.filter(m=>{const p=getClientHours(c,m);return p&&getClientAllocated(c.id,m)/p>1.3;}).length>=2;
  });
  if(scopeClients.length){
    insights.push(card('warn','↑','חריגת היקף עקבית',scopeClients.map(c=>{
      const rel=histMonths.filter(m=>getClientHours(c,m)>0);
      const avgPct=Math.round(rel.reduce((s,m)=>{const p=getClientHours(c,m);return s+(p?getClientAllocated(c.id,m)/p*100:0);},0)/rel.length);
      return `<strong>${c.name}</strong> — ממוצע ${avgPct}% (+${avgPct-100}% מעל תקציב) ב-${rel.length} חודשים`;
    }).join('<br>'),`${scopeClients.length} לקוח${scopeClients.length>1?'ות':''}`));
  }

  // ── 7. Client concentration risk ──
  if(curr.contracted>0){
    const sorted=visClients.map(c=>({c,h:getClientHours(c,mk)||0})).filter(x=>x.h>0).sort((a,b)=>b.h-a.h);
    if(sorted.length){
      const top1=sorted[0];
      const top3H=sorted.slice(0,3).reduce((s,x)=>s+x.h,0);
      const top1Pct=Math.round(top1.h/curr.contracted*100);
      const top3Pct=Math.round(top3H/curr.contracted*100);
      if(top1Pct>=25||top3Pct>=60){
        insights.push(card('warn','⚠','ריכוזיות גבוהה בלקוחות',`<strong>${top1.c.name}</strong> מהווה ${top1Pct}% מסה״כ השעות המוזמנות.<br>3 הלקוחות הגדולים יחד = ${top3Pct}% מהביקוש הכולל — תלות גבוהה, סיכון מוגבר באובדן לקוח.`,`${sorted.length} לקוחות פעילים`));
      }
    }
  }

  // ── 8. Demand trend ──
  if(mStats.length>=2){
    const first=mStats[0],last=curr;
    if(first.contracted>0){
      const growth=Math.round((last.contracted-first.contracted)/first.contracted*100);
      if(Math.abs(growth)>=10){
        const sev=growth>0?'ok':'warn';
        insights.push(card(sev,growth>0?'↑':'↓',`ביקוש לקוחות ב${growth>0?'עלייה':'ירידה'}`,`השעות המוזמנות ${growth>0?'עלו':'ירדו'} ב-<strong>${Math.abs(growth)}%</strong> מ-${mkLabel(first.m)} עד ${mkLabel(last.m)} (${first.contracted}h → ${last.contracted}h).`,`${mStats.length} חודשים`));
      }
    }
  }

  // ── 9. Demand vs capacity structural gap ──
  const overCapN=mStats.filter(s=>s.contracted>s.cap*1.1).length;
  if(overCapN>=2){
    insights.push(card('danger','↑','ביקוש מבני עולה על קיבולת',`ב-<strong>${overCapN} מתוך ${histMonths.length} חודשים</strong> הביקוש המוזמן עולה על קיבולת הצוות ב-10%+. חלק מהלקוחות כנראה לא מקבלים שירות מלא. שקול גיוס.`,mStats.map(s=>`${Math.round(s.contracted/Math.max(s.cap,1)*100)}%`).join(', ')));
  }

  // ── 10. Revenue mix ──
  const retH=state.clients.filter(c=>c.active!==false&&c.type==='retainer').reduce((s,c)=>s+(getClientHours(c,mk)||0),0);
  const projH=state.clients.filter(c=>c.active!==false&&c.type==='project').reduce((s,c)=>s+(getClientHours(c,mk)||0),0);
  const mixTotal=retH+projH;
  if(mixTotal>0){
    const retPct=Math.round(retH/mixTotal*100);
    if(retPct>=80){
      insights.push(card('ok','✓','תמהיל עסקי בריא',`<strong>${retPct}%</strong> ריטיינר — הכנסה צפויה ויציבה. ${100-retPct}% פרויקטלי — גמישות עסקית.`,'mix'));
    }else if(retPct<50){
      insights.push(card('warn','!','תמהיל — תלות גבוהה בפרויקטים',`רק <strong>${retPct}%</strong> מהשעות הן ריטיינר. ${100-retPct}% פרויקטלי — חשיפה לתנודות בהכנסות.`,'mix'));
    }
  }

  if(!insights.length)return'';

  return`<div style="margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2a5.5 5.5 0 100 11A5.5 5.5 0 007.5 2z" stroke="var(--primary)" stroke-width="1.4"/><path d="M7.5 5.5v3M7.5 10v.5" stroke="var(--primary)" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span style="font-weight:700;font-size:14px">תובנות עסקיות</span>
      <span style="font-size:11px;color:var(--muted)">ניתוח על בסיס ${histMonths.length} חודשים — ${histMonths.map(m=>mkLabel(m).split(' ')[0]).join(', ')}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px">
      ${insights.join('')}
    </div>
  </div>`
}

  Chart.defaults.font.family='-apple-system,"Segoe UI",Arial,sans-serif';
  const topC=state.clients.filter(c=>c.active!==false&&getClientHours(c,m)>0).sort((a,b)=>getClientHours(b,m)-getClientHours(a,m)).slice(0,12);
  const c1=document.getElementById('ch-alloc');
  if(c1)_chartInstances.alloc=new Chart(c1,{type:'bar',data:{
    labels:topC.map(c=>c.name.length>14?c.name.slice(0,14)+'…':c.name),
    datasets:[
      {label:'מוזמן',data:topC.map(c=>getClientHours(c,m)),backgroundColor:'#6366f133',borderColor:'#6366f1',borderWidth:1.5,borderRadius:4},
      {label:'מוקצה',data:topC.map(c=>getClientAllocated(c.id,m)),backgroundColor:'#10b98133',borderColor:'#10b981',borderWidth:1.5,borderRadius:4},
    ]},options:{responsive:true,plugins:{legend:{position:'top',rtl:true}},scales:{y:{beginAtZero:true}}}});

  const retH=state.clients.filter(c=>c.active!==false&&c.type==='retainer').reduce((s,c)=>s+getClientHours(c,m),0);
  const projH=state.clients.filter(c=>c.active!==false&&c.type==='project').reduce((s,c)=>s+getClientHours(c,m),0);
  const intH=state.clients.filter(c=>c.active!==false&&c.type==='internal').reduce((s,c)=>s+getClientHours(c,m),0);
  const c2=document.getElementById('ch-type');
  if(c2)_chartInstances.type=new Chart(c2,{type:'doughnut',data:{labels:['ריטיינר','פרויקט','פנימי'],datasets:[{data:[retH,projH,intH],backgroundColor:['#6366f1','#10b981','#7c3aed'],borderWidth:0}]},options:{responsive:false,plugins:{legend:{position:'bottom',rtl:true}},cutout:'65%'}});

  const c4=document.getElementById('ch-trend');
  if(c4)_chartInstances.trend=new Chart(c4,{type:'line',data:{
    labels:MONTHS.map(x=>x.short),
    datasets:[
      {label:'שעות לקוחות',data:MONTHS.map(mo=>state.clients.filter(c=>c.active!==false).reduce((s,c)=>s+getClientHours(c,mo.key),0)),borderColor:'#6366f1',backgroundColor:'#6366f112',fill:true,tension:.4,borderWidth:2,pointBackgroundColor:'#6366f1'},
      {label:'קיבולת עובדים',data:MONTHS.map(mo=>state.employees.reduce((s,e)=>s+getEmpHours(e,mo.key),0)),borderColor:'#10b981',backgroundColor:'transparent',tension:.4,borderWidth:2,borderDash:[5,3],pointBackgroundColor:'#10b981'},
    ]},options:{responsive:true,plugins:{legend:{position:'top',rtl:true}},scales:{y:{beginAtZero:true}}}});
}

// ===================== CLIENTS PAGE =====================
function renderClients(){
  const m=state.currentMonth,ml=MONTHS.find(x=>x.key===m)?.label||m;
  const totalH=state.clients.filter(c=>c.active!==false).reduce((s,c)=>s+getClientHours(c,m),0);
  const retC=state.clients.filter(c=>c.active!==false&&c.type==='retainer').length;
  const projC=state.clients.filter(c=>c.active!==false&&c.type==='project').length;
  const intC=state.clients.filter(c=>c.active!==false&&c.type==='internal').length;

  const activeCount=state.clients.filter(c=>c.active!==false).length;
  const rows=state.clients
    .slice().sort((a,b)=>a.name.localeCompare(b.name,'he'))
    .filter(c=>_clientShowInactive||c.active!==false)
    .map(c=>{
    const cont=getClientHours(c,m),alloc=getClientAllocated(c.id,m);
    const util=cont>0?Math.round(alloc/cont*100):0;
    const bc=util>100?'pb-d':util>80?'pb-w':'pb-i';
    const isInactive=c.active===false;
    // Bank column
    let bankCol='<span class="text-m text-sm">—</span>';
    if(c.type==='project'&&c.hoursBank){
      const billed=getTotalBilled(c);
      const remain=Math.max(0,c.hoursBank-billed);
      const pct=Math.round(billed/c.hoursBank*100);
      const bc2=remain<c.hoursBank*0.2?'pb-d':remain<c.hoursBank*0.5?'pb-w':'pb-s';
      const rc=remain<c.hoursBank*0.2?'var(--danger)':remain<c.hoursBank*0.5?'var(--warning)':'var(--success)';
      bankCol=`<div style="min-width:130px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <strong style="color:${rc}">${remain}h נותר</strong>
          <span style="color:var(--muted)">${billed}/${c.hoursBank}h</span>
        </div>
        <div class="pb-wrap"><div class="pb ${bc2}" style="width:${Math.min(pct,100)}%"></div></div>
      </div>`;
    }
    return `<tr${isInactive?' class="emp-hidden"':''}>
      <td>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" ${isInactive?'':'checked'} onchange="toggleClientActive('${c.id}')"
            style="width:15px;height:15px;cursor:pointer;accent-color:var(--primary)">
          <strong style="${isInactive?'color:var(--muted)':''}">${c.name}</strong>
          ${isInactive?'<span class="chip">לא פעיל</span>':''}
        </label>
      </td>
      <td>${clientTypeBadge(c.type)}</td>
      <td><input type="number" class="fi" style="width:90px;padding:4px 8px" value="${cont}" min="0" onchange="updateClientHours('${c.id}','${m}',this.value)"></td>
      <td>${bankCol}</td>
      <td>${alloc}</td>
      <td style="min-width:110px"><div class="flex items-c gap2"><div class="pb-wrap" style="flex:1"><div class="pb ${bc}" style="width:${Math.min(util,100)}%"></div></div><span class="text-sm text-m" style="min-width:35px">${util}%</span></div></td>
      <td style="min-width:90px">${(()=>{const wd=c.weeklyDay!=null?(Array.isArray(c.weeklyDay)?c.weeklyDay:[c.weeklyDay]):[];if(!wd.length)return'<span class="text-m text-sm">—</span>';const names={0:'א׳',1:'ב׳',2:'ג׳',3:'ד׳',4:'ה׳'};return'<div style="display:flex;gap:4px;flex-wrap:wrap">'+wd.map(d=>'<span style="background:var(--primary-light,#ede9fe);color:var(--primary);border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600">'+names[d]+'</span>').join('')+'</div>';})()}</td>
      <td><div class="actions">
        <button class="btn btn-s btn-sm" onclick="openClientModal('${c.id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5a1.41 1.41 0 0 1 2 2L3.5 10.5l-3 .5.5-3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg> ערוך</button>
        <button class="btn btn-d btn-sm" onclick="deleteClient('${c.id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1,3 11,3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M4 3V2h4v1M2 3l.7 7.3A1 1 0 0 0 3.7 11h4.6a1 1 0 0 0 1-.7L10 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div></td>
    </tr>`;
  }).join('');

  return `
  <div class="page-hd flex items-c just-b">
    <div><div class="page-title">לקוחות</div><div class="page-sub">${activeCount} פעילים מתוך ${state.clients.length} | ${retC} ריטיינר | ${projC} פרויקט${intC?` | ${intC} פנימי`:''} | ${totalH} שעות ב${ml}</div></div>
    <div class="flex gap2">
      <button class="btn btn-s btn-sm" onclick="_clientShowInactive=!_clientShowInactive;renderPage()">${_clientShowInactive?'הסתר לא פעילים':'הצג לא פעילים'}</button>
      <button class="btn btn-p" onclick="openClientModal()">+ הוסף לקוח</button>
    </div>
  </div>
  <div class="card">
    <div class="card-hd"><div class="card-title">רשימת לקוחות</div><span class="text-sm text-m">☑ = פעיל במטריצה | עריכת שעות ישירה לחודש: ${ml}</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>☑ שם לקוח</th><th>סוג</th><th>שעות ${ml}</th><th>🏦 בנק שעות</th><th>מוקצות</th><th>ניצולת</th><th>ימי ויקלי</th><th>פעולות</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

function updateClientHours(cid,mk,v){
  const c=state.clients.find(x=>x.id===cid);
  if(!c)return;
  if(!c.monthlyHours)c.monthlyHours={};
  c.monthlyHours[mk]=parseFloat(v)||0;
  saveState();
}

function deleteClient(id){
  if(!confirm('למחוק לקוח זה? כל ההקצאות שלו ימחקו.'))return;
  state.clients=state.clients.filter(c=>c.id!==id);
  Object.keys(state.matrix).forEach(mk=>Object.keys(state.matrix[mk]).forEach(eid=>{delete state.matrix[mk][eid][id];}));
  saveState();renderPage();
}

function toggleClientActive(cid){
  const c=state.clients.find(x=>x.id===cid);
  if(c){c.active=c.active===false?true:false;saveState();renderPage();}
}

    <div class="mcell">
      <div class="mcell-lbl">${mo.short}${isProj?'<br><span style="font-size:8px;color:#6366f1">מתוכנן</span>':''}</div>

  document.getElementById('modal-root').innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:580px">
      <div class="modal-hd">

        <button class="btn btn-s" style="padding:5px 9px" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-bd">
        <div class="fg"><label class="fl">שם לקוח</label>
          <input type="text" class="fi" id="c-name" value="${c?.name||''}" placeholder="שם הלקוח"></div>
        <div class="fg"><label class="fl">סוג לקוח</label>
          <select class="fs" id="c-type" onchange="toggleClientTypeFields(this.value)">
            <option value="retainer" ${c?.type==='retainer'||!c?'selected':''}>ריטיינר</option>
            <option value="project" ${c?.type==='project'?'selected':''}>פרויקט</option>
            <option value="internal" ${c?.type==='internal'?'selected':''}>פנימי</option>
          </select></div>
        <div id="bank-section" ${isProj?'':'style="display:none"'}>

function toggleClientTypeFields(type){
  const isProj=type==='project';
  const isInt=type==='internal';
  const bs=document.getElementById('bank-section');
  if(bs)bs.style.display=isProj?'':'none';
  const hs=document.getElementById('hours-section');
  if(hs)hs.style.display=isInt?'none':'';
  const bl=document.getElementById('billed-lbl');
  if(bl)bl.style.display=isProj?'':'none';
  document.querySelectorAll('.billed-row').forEach(el=>el.style.display=isProj?'':'none');
  const wds=document.getElementById('weekly-day-section');
  if(wds)wds.style.display=isInt?'none':'';
}

function applyToAllMonths(){
  const val=document.getElementById('apply-all-val').value;
  document.querySelectorAll('[data-month]').forEach(i=>i.value=val||0);
}

function saveClient(cid){
  const name=document.getElementById('c-name').value.trim();
  const type=document.getElementById('c-type').value;
  if(!name){alert('יש להזין שם לקוח');return;}
  const mh={};
  document.querySelectorAll('[data-month]').forEach(i=>{mh[i.dataset.month]=parseFloat(i.value)||0;});
  const billedH={};
  document.querySelectorAll('[data-billed]').forEach(i=>{const v=parseFloat(i.value);if(v>0)billedH[i.dataset.billed]=v;});
  const bankVal=parseFloat(document.getElementById('c-bank')?.value)||0;
  const assignedEmpIds=new Set([...document.querySelectorAll('[data-cemp]:checked')].map(i=>i.dataset.cemp));
  let clientId=cid;
  if(cid){
    const c=state.clients.find(x=>x.id===cid);
    if(c){
      c.name=name;c.type=type;c.monthlyHours=mh;
      if(type==='project'){if(bankVal)c.hoursBank=bankVal;else delete c.hoursBank;c.billedHours=billedH;}
      else{delete c.hoursBank;delete c.billedHours;}
      const wdArr=[0,1,2,3,4].filter(v=>document.getElementById(`c-wd-${v}`)?.checked);
      if(wdArr.length)c.weeklyDay=wdArr;else delete c.weeklyDay;
    }
  } else {
    const nc={id:'c'+Date.now(),name,type,monthlyHours:mh};
    if(type==='project'){if(bankVal)nc.hoursBank=bankVal;nc.billedHours=billedH;}
    const wdArr2=[0,1,2,3,4].filter(v=>document.getElementById(`c-wd-${v}`)?.checked);
    if(wdArr2.length)nc.weeklyDay=wdArr2;
    state.clients.push(nc);
    state.clients.sort((a,b)=>a.name.localeCompare(b.name,'he'));
    clientId=nc.id;
  }
  // Sync preferredClients on employees
  state.employees.forEach(e=>{
    const prefs=e.preferredClients||[];
    if(assignedEmpIds.has(e.id)&&!prefs.includes(clientId)){prefs.push(clientId);e.preferredClients=prefs;}
    else if(!assignedEmpIds.has(e.id)&&prefs.includes(clientId)){e.preferredClients=prefs.filter(x=>x!==clientId);}
  });
  saveState();
  if(_empEditReturnId!==null){
    const returnId=_empEditReturnId;
    _empEditReturnId=null;
    renderPage();
    openEmpModal(returnId||undefined);
  } else {
    closeModal();renderPage();
  }
}

function toggleEmpVisibility(eid){
  const e=state.employees.find(x=>x.id===eid);
  if(e){e.visible=e.visible===false?true:false;saveState();renderPage();}
}
function toggleAllEmployees(show){
  state.employees.forEach(e=>e.visible=show);
  saveState();renderPage();
}
function updateEmpHours(eid,mk,v){
  const e=state.employees.find(x=>x.id===eid);
  if(!e)return;
  if(!e.monthlyHours)e.monthlyHours={};
  e.monthlyHours[mk]=parseFloat(v)||0;
  saveState();
}
function updateEmpVacDays(eid,mk,v){
  if(!state.vacations)state.vacations={};
  if(!state.vacations[mk])state.vacations[mk]={};
  const days=parseFloat(v)||0;
  if(days>0)state.vacations[mk][eid]=days;
  else delete state.vacations[mk][eid];
  saveState();renderPage();
}
function resetEmpHours(eid,mk){
  const e=state.employees.find(x=>x.id===eid);
  if(e&&e.monthlyHours){delete e.monthlyHours[mk];saveState();renderPage();}
}
function deleteEmployee(id){
  if(!confirm('למחוק עובד זה?'))return;
  state.employees=state.employees.filter(e=>e.id!==id);
  Object.keys(state.matrix).forEach(mk=>{delete state.matrix[mk][id];});
  saveState();renderPage();
}

function buildAllocationMsg(e,m){
  const ml=MONTHS.find(x=>x.key===m)?.label||m;
  const ed=(state.matrix[m]||{})[e.id]||{};
  const alloc=getEmpAllocated(e.id,m),avail=getEmpHours(e,m);
  const lines=Object.entries(ed)
    .filter(([,h])=>(parseFloat(h)||0)>0)
    .map(([cid,h])=>{const c=state.clients.find(x=>x.id===cid);return `• ${c?c.name:cid}: ${h}h`;})
    .join('\n');
  return `היי ${e.name},\nהנה הקצאת השעות שלך לחודש ${ml}:\n\n${lines||'אין הקצאות'}\n\nסה״כ: ${alloc}/${avail}h`;
}

function getEditedMsg(eid){
  const ta=document.getElementById('alloc-msg-'+eid);
  return ta?ta.value:buildAllocationMsg(state.employees.find(x=>x.id===eid),state.currentMonth);
}

            העתק הודעה

async function sendSlackMsg(eid,msg,btn){
  const e=state.employees.find(x=>x.id===eid);
  if(!e?.slackWebhook)return;
  if(btn){btn.disabled=true;btn.textContent='שולח...';}
  try{
    const r=await fetch(e.slackWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:msg})});
    if(r.ok||r.type==='opaque'){
      if(btn){btn.textContent='✓ נשלח';btn.style.background='var(--success)';}
    }else{
      if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10l1.5-3.5L2 3h10l-1.5 3.5L12 10H7.5L5 12.5V10H2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg> שלח ב-Slack';}
      alert('שגיאה בשליחה ל-Slack: '+r.status);
    }
  }catch(err){
    if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10l1.5-3.5L2 3h10l-1.5 3.5L12 10H7.5L5 12.5V10H2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg> שלח ב-Slack';}
    navigator.clipboard.writeText(msg).then(()=>alert('לא ניתן לשלוח ישירות (CORS).\nההודעה הועתקת ללוח — הדבק ב-Slack ידנית.'));
  }
}

function openNewMonthModal(){
  // Default: next month after last active, in current year
  const active=state.activeMonths||[];
  const now=new Date();
  const defaultY=now.getFullYear()<2026?2026:now.getFullYear();
  // Find first month of defaultY not yet active
  let defaultMk=null;
  for(let m=1;m<=12;m++){const k=mkKey(defaultY,m);if(!active.includes(k)){defaultMk=k;break;}}
  if(!defaultMk)defaultMk=mkKey(defaultY+1,1);
  openMonthSetupModal(defaultMk);
}

function updateVacPreview(inp,mk,overrideWorkDays){
  const eid=inp.dataset.vaceid;
  const e=state.employees.find(x=>x.id===eid);
  if(!e)return;
  const scope=(e.scope!=null?e.scope:100)/100;
  // if caller supplies overrideWorkDays, compute base from it instead of saved state
  let base;
  if(overrideWorkDays!==undefined){
    base=Math.round(overrideWorkDays*7*scope);
  } else {
    base=e.monthlyHours?.[mk]!==undefined?e.monthlyHours[mk]:calcAutoHoursForEmp(e,mk);
  }
  const vac=parseFloat(inp.value)||0;
  const preview=document.getElementById('vac-preview-'+eid);
  if(!preview)return;
  if(vac>0){
    const afterVac=Math.max(0,base-Math.round(vac*7*scope));
    preview.innerHTML='<span style="color:var(--muted-2);font-size:11px">'+base+'h</span> <span style="font-size:11px;color:var(--muted-2)">→</span> <span style="font-weight:600;font-size:12px;color:var(--primary)">'+afterVac+'h</span>';
  } else {
    preview.innerHTML='<span style="font-weight:600;font-size:12px">'+base+'h</span>';
  }
}

function onMsDaysChange(val,mk){
  const days=parseFloat(val)||0;
  document.getElementById('ms-hours-preview').textContent=Math.round(days*7)+'h';
  // recalculate all vacation previews with the new workdays value
  document.querySelectorAll('[data-vaceid]').forEach(inp=>updateVacPreview(inp,mk,days));
}

let _vacIdx=0;

function addVacRow(mk){
  const list=document.getElementById('vac-list');
  if(!list)return;
  const existingEids=new Set([...document.querySelectorAll('[data-vaceid]')].map(el=>el.dataset.vaceid).filter(Boolean));
  const available=state.employees.filter(e=>!existingEids.has(e.id));
  if(!available.length){alert('כל העובדים כבר נוספו');return;}
  const uid='vr'+(_vacIdx++);
  const opts=available.map(e=>'<option value="'+e.id+'">'+e.name+'</option>').join('');
  const row=document.createElement('div');
  row.dataset.vacRow=uid;
  row.style.cssText='display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)';
  row.innerHTML='<select class="fi" style="flex:1;padding:4px 8px" onchange="activateVacRow(this,\''+mk+'\',\''+uid+'\')">'
    +'<option value="">בחר עובד</option>'+opts+'</select>'
    +'<span id="vac-preview-'+uid+'" style="min-width:80px;text-align:left"></span>'
    +'<input type="number" min="0" max="30" class="fi" style="width:70px;padding:4px 8px;text-align:center" value="" data-vaceid="" oninput="updateVacPreview(this,\''+mk+'\')" disabled>'
    +'<span style="font-size:11px;color:var(--muted)">ימים</span>'
    +'<button class="btn btn-s btn-sm" onclick="removeVacRow(\''+uid+'\')" style="padding:2px 7px">✕</button>';
  // ensure the container has padding when rows exist
  list.style.padding='6px 10px';
  list.appendChild(row);
}

function activateVacRow(sel,mk,uid){
  const eid=sel.value;
  if(!eid)return;
  const row=document.querySelector('[data-vac-row="'+uid+'"]');
  if(!row)return;
  const inp=row.querySelector('input[type="number"]');
  inp.dataset.vaceid=eid;
  inp.disabled=false;
  inp.value=(state.vacations[mk]?.[eid])||'';
  // move preview span id to eid so updateVacPreview can find it
  const preview=document.getElementById('vac-preview-'+uid);
  if(preview)preview.id='vac-preview-'+eid;
  const e=state.employees.find(x=>x.id===eid);
  const nameSpan=document.createElement('span');
  nameSpan.style.cssText='flex:1;font-size:13px';
  nameSpan.textContent=e?e.name:'';
  sel.replaceWith(nameSpan);
  // pass the live ms-days value so the preview reflects the current modal setting, not stale saved state
  const msDaysEl=document.getElementById('ms-days');
  const wdLive=msDaysEl?parseFloat(msDaysEl.value):NaN;
  updateVacPreview(inp,mk,!isNaN(wdLive)?wdLive:undefined);
}

function removeVacRow(uid){
  const row=document.querySelector('[data-vac-row="'+uid+'"]');
  if(!row)return;
  row.remove();
  const list=document.getElementById('vac-list');
  if(list&&!list.querySelector('[data-vac-row]'))list.style.padding='0';
}

function removeClientForm(idx){
  const card=document.querySelector(`[data-nc-card="${idx}"]`);
  if(card)card.remove();
}

function toggleNcFields(idx,type){
  const bank=document.getElementById(`nc-bank-${idx}`);
  const hrs=document.getElementById(`nc-hrs-${idx}`);
  if(bank)bank.style.display=type==='project'?'':'none';
  if(hrs)hrs.style.display=type==='internal'?'none':'';
}

function saveMonthSetup(mk){
  if(!state.monthSetup)state.monthSetup={};
  if(!state.vacations)state.vacations={};
  const days=parseFloat(document.getElementById('ms-days').value);
  if(!isNaN(days))state.monthSetup[mk]={workDays:days};
  if(!state.vacations[mk])state.vacations[mk]={};
  document.querySelectorAll('[data-vaceid]').forEach(inp=>{
    const eid=inp.dataset.vaceid;
    if(!eid)return;
    const v=parseFloat(inp.value)||0;
    if(v>0)state.vacations[mk][eid]=v;
    else delete state.vacations[mk][eid];
  });
  // ── Save all new client cards ──
  document.querySelectorAll('[data-nc-card]').forEach(card=>{
    const idx=card.dataset.ncCard;
    const nameEl=document.getElementById(`nc-name-${idx}`);
    if(!nameEl)return;
    const name=nameEl.value.trim();
    if(!name)return;
    const type=document.getElementById(`nc-type-${idx}`)?.value||'retainer';
    const hours=parseFloat(document.getElementById(`nc-hours-${idx}`)?.value)||0;
    const bank=parseFloat(document.getElementById(`nc-bankval-${idx}`)?.value)||0;
    const mh={};
    if(hours>0)mh[mk]=hours;
    const nc={id:'c'+Date.now()+'_'+idx,name,type,monthlyHours:mh};
    if(type==='project'&&bank)nc.hoursBank=bank;
    state.clients.push(nc);
    const clientId=nc.id;
    state.employees.forEach(e=>{
      const cb=card.querySelector(`[data-nc-emp-${idx}="${e.id}"]`);
      if(cb?.checked){
        if(!e.preferredClients)e.preferredClients=[];
        if(!e.preferredClients.includes(clientId))e.preferredClients.push(clientId);
      }
    });
  });
  state.clients.sort((a,b)=>a.name.localeCompare(b.name,'he'));
  if(!state.activeMonths)state.activeMonths=[];
  if(!state.activeMonths.includes(mk)){
    state.activeMonths.push(mk);
    state.activeMonths.sort();
  }
  state.currentMonth=mk;
  saveState();initMonthSelect();closeModal();renderPage();
}

function copyAllocations(fromMk,toMk){
  if(!state.matrix[fromMk]){alert('אין נתונים בחודש הנבחר');return;}
  state.matrix[toMk]=JSON.parse(JSON.stringify(state.matrix[fromMk]));
  saveState();renderPage();
}

function resetMonth(mk){
  state.matrix[mk]={};
  saveState();renderPage();
}

function updateScopePreview(val){
  const scope=Math.max(1,Math.min(100,Math.round(parseFloat(val)||100)));
  const inp=document.getElementById('e-scope');
  if(inp)inp.value=scope;
  document.querySelectorAll('.scope-preset').forEach(btn=>{
    const p=parseInt(btn.dataset.preset);
    const active=p===scope;
    btn.style.background=active?'var(--primary)':'';
    btn.style.color=active?'#fff':'';
    btn.style.borderColor=active?'var(--primary)':'';
  });
  // Update the read-only value cells in the monthly hours grid
  MONTHS.forEach(mo=>{
    const cell=document.getElementById('mcell-val-'+mo.key);
    if(!cell)return;
    cell.textContent=Math.round(calcAutoHours(mo.key)*scope/100);
  });
}
function saveEmployee(eid){
  const name=document.getElementById('e-name').value.trim();
  const role=document.getElementById('e-role').value.trim();
  if(!name){alert('יש להזין שם עובד');return;}
  const scope=Math.max(1,Math.min(100,parseFloat(document.getElementById('e-scope')?.value)||100));
  const prefClients=[...document.querySelectorAll('[data-pref]:checked')].map(i=>i.dataset.pref);
  const email=document.getElementById('e-email').value.trim();
  const slackWebhook=document.getElementById('e-slack').value.trim();
  if(eid){const e=state.employees.find(x=>x.id===eid);if(e){e.name=name;e.role=role;e.scope=scope;e.preferredClients=prefClients;e.email=email;e.slackWebhook=slackWebhook;}}
  else{state.employees.push({id:'e'+Date.now(),name,role,scope,visible:true,monthlyHours:{},preferredClients:prefClients,email,slackWebhook});state.employees.sort((a,b)=>a.name.localeCompare(b.name,'he'));}
  saveState();closeModal();renderPage();
}

// ===================== MATRIX PAGE =====================
function renderMatrix(){
  const m=state.currentMonth,ml=MONTHS.find(x=>x.key===m)?.label||m;
  if(!state.matrix[m])state.matrix[m]={};

  // Only visible employees in matrix
  const visEmps=state.employees.filter(e=>e.visible!==false);
  const visClients=state.clients.filter(c=>
    c.active!==false&&(
      _showAll||
      getClientHours(c,m)>0||
      Object.values(state.matrix[m]).some(ed=>(parseFloat(ed[c.id])||0)>0)
    ));

  const focusedCids=_matrixFocusEmp
    ?new Set(Object.entries(state.matrix[m][_matrixFocusEmp]||{}).filter(([,h])=>(parseFloat(h)||0)>0).map(([cid])=>cid))
    :null;
  const visCols=focusedCids?visClients.filter(c=>focusedCids.has(c.id)):visClients;

  const cHeaders=visCols.map(c=>{
    const cont=getClientHours(c,m),alloc=getClientAllocated(c.id,m),diff=alloc-cont;
    const col=cont===0?'var(--muted)':diff>0?'var(--danger)':diff<0?'var(--warning)':'var(--success)';
    return `<th class="mx-th-c">
      <div title="${c.name}" style="max-width:90px;overflow:hidden;text-overflow:ellipsis">${c.name.length>11?c.name.slice(0,11)+'…':c.name}</div>
      <div id="ch-${c.id}" style="font-size:10px;color:${col};margin-top:3px">${alloc}/${cont}h</div>
      <div style="font-size:9px;color:var(--muted)">${clientTypeLabel(c.type)}</div>
    </th>`;
  }).join('');

  const empRows=visEmps.map(e=>{
    const ed=(state.matrix[m][e.id]||{});
    const avail=getEmpHours(e,m),alloc=getEmpAllocated(e.id,m);
    const ac=getEmpActiveClients(e.id,m),isOver=alloc>avail;
    const isFocused=_matrixFocusEmp===e.id;
    const dimRow=_matrixFocusEmp&&!isFocused;
    const cells=visCols.map(c=>{
      const val=parseFloat(ed[c.id])||0,hasAlloc=val>0,canAdd=ac<6||hasAlloc;
      return `<td style="padding:0">
        <input type="number" class="mx-inp" min="0" value="${val||''}" placeholder="—"
          data-eid="${e.id}" data-cid="${c.id}"
          style="${hasAlloc?'background:#eef2ff':''}" ${canAdd?'':'disabled title="עד 6 לקוחות"'}
          onchange="onMatrixChange(this,'${m}')" onfocus="this.select()" oninput="onMatrixInput(this,'${m}')">
      </td>`;
    }).join('');
    return `<tr style="${dimRow?'opacity:0.25;transition:opacity .15s':'transition:opacity .15s'}${isFocused?';background:#f0f4ff':''}">
      <td class="mx-td-emp" style="cursor:pointer${isFocused?';background:#e8eeff':''}" onclick="_matrixFocusEmp=_matrixFocusEmp==='${e.id}'?null:'${e.id}';renderPage()" title="${isFocused?'לחץ לביטול הסינון':'לחץ להדגשת עובד'}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <span>${isFocused?'<span style="color:var(--primary);margin-left:3px">◉</span>':''}<span>${e.name}</span>${(e.preferredClients||[]).length>0?'<span style="font-size:9px;color:var(--primary);margin-right:3px">★</span>':''}</span>
          <span id="et-${e.id}" class="mx-emp-tot${isOver?' over':''}">${alloc}/${avail}h${isOver?' ⚠':''}</span>
        </div>
        <div class="emp-sub"><span id="ac-${e.id}-${m}">${ac}</span>/6 לקוחות</div>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  const cTots=visCols.map(c=>{
    const cont=getClientHours(c,m),alloc=getClientAllocated(c.id,m);
    const col=cont===0?'var(--muted)':alloc>cont?'var(--danger)':alloc===cont?'var(--success)':'var(--warning)';

  }).join('');


  return `
  <div class="page-hd flex items-c just-b">
    <div><div class="page-title">מטריצת הקצאות</div>
      <div class="page-sub">${ml} | ${visEmps.length} עובדים מוצגים | עד 6 לקוחות לעובד</div>

    const prevMks=(state.activeMonths||[]).filter(x=>x<m);
