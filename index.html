// ===================== AUTO-DISTRIBUTE =====================
// Splits `total` (floored to nearest 5) proportionally by weights.
// Returns multiples of 5 only. Sum ≤ total. Never exceeds input total.
function _split5(weights, total){
  const t5=Math.floor(total/5)*5;
  if(!weights.length||t5<=0) return weights.map(()=>0);
  const units=t5/5;
  const wSum=weights.reduce((s,v)=>s+v,0)||weights.length;
  const exact=weights.map(w=>(w/wSum)*units);
  const fl=exact.map(v=>Math.floor(v));
  let rem=units-fl.reduce((s,v)=>s+v,0);
  exact.map((v,i)=>({i,f:v-fl[i]})).sort((a,b)=>b.f-a.f)
       .forEach(({i})=>{ if(rem-->0) fl[i]++; });
  return fl.map(v=>v*5);
}

function autoDistribute(mk){
  const visEmps=state.employees.filter(e=>e.visible!==false);
  if(!visEmps.length){alert('אין עובדים פעילים במטריצה. סמן עובדים בצ׳קבוקס.');return;}

  const clients=state.clients.filter(c=>c.active!==false&&c.type!=='internal'&&getClientHours(c,mk)>0)
    .sort((a,b)=>{
      const aR=a.type==='project'?1:0,bR=b.type==='project'?1:0;
      if(aR!==bR) return aR-bR;
      return getClientHours(b,mk)-getClientHours(a,mk);
    });
  if(!clients.length){alert('אין לקוחות עם שעות בחודש זה. הגדר שעות ללקוחות תחילה.');return;}
  if(!confirm(`פיזור אוטומטי ל-${mkLabel(mk)}: יאפס את ההקצאות ל-${visEmps.length} עובדים ויפזר לפי לקוחות קבועים. להמשיך?`)) return;

  // ── init ──
  if(!state.matrix[mk]) state.matrix[mk]={};
  visEmps.forEach(e=>{ state.matrix[mk][e.id]={}; });

  const rem={};
  visEmps.forEach(e=>{ rem[e.id]=Math.floor(getEmpHours(e,mk)/5)*5; });

  // clientRem: remaining quota per client — never goes negative, never exceeded
  const clientRem={};
  clients.forEach(c=>{ clientRem[c.id]=getClientHours(c,mk); });

  // לכל לקוח — רק עובדים שהלקוח מוגדר אצלהם כלקוח קבוע
  for(const client of clients){
    if(clientRem[client.id]<5) continue;

    const eligible=visEmps
      .filter(e=>(e.preferredClients||[]).includes(client.id)&&rem[e.id]>=5)
      .sort((a,b)=>rem[b.id]-rem[a.id]); // מי שיש לו יותר קיבולת — קודם

    if(!eligible.length) continue;

    const quota=clientRem[client.id];
    // חלוקה יחסית לפי קיבולת עובד, כפולות של 5, לא חורג מהמכסה
    const caps=eligible.map(e=>Math.min(rem[e.id],quota));
    const shares=_split5(caps, Math.min(quota, caps.reduce((s,v)=>s+v,0)));

    eligible.forEach((emp,i)=>{
      const share=Math.min(shares[i], rem[emp.id], clientRem[client.id]);
      const share5=Math.floor(share/5)*5;
      if(share5>=5){
        state.matrix[mk][emp.id][client.id]=share5;
        rem[emp.id]-=share5;
        clientRem[client.id]-=share5;
      }
    });
  }

  // אין שלב 2 — שעות שנשארו לעובד נשארות ריקות לעדכון ידני

  saveState();
  renderPage();

  const totalAssigned=visEmps.reduce((s,e)=>s+getEmpAllocated(e.id,mk),0);
  const totalNeeded=clients.reduce((s,c)=>s+getClientHours(c,mk),0);
  const clientsCovered=clients.filter(c=>clientRem[c.id]<5).length;
  const empsWithGap=visEmps.filter(e=>rem[e.id]>=5);
  setTimeout(()=>{
    let msg=`פיזור אוטומטי הושלם!\n\nלקוחות שכוסו במלואם: ${clientsCovered}/${clients.length}\nשעות לקוחות שהוקצו: ${totalAssigned}h מתוך ${totalNeeded}h`;
    if(empsWithGap.length)
      msg+=`\n\nעובדים עם שעות פנויות לעדכון ידני (${empsWithGap.length}):\n`+
           empsWithGap.map(e=>`• ${e.name}: ${rem[e.id]}h`).join('\n');
    alert(msg);
  },100);
}

// ===================== WEEKLY SCHEDULE =====================
const _wdName={0:'א׳',1:'ב׳',2:'ג׳',3:'ד׳',4:'ה׳'};
const _wdFullName={0:'ראשון',1:'שני',2:'שלישי',3:'רביעי',4:'חמישי'};

function normWS(val){if(!val)return[];return Array.isArray(val)?val:[val];}

function _buildMonthWorkDays(mk){
  const [yr,mo]=mk.split('-').map(Number);
  const daysInMonth=new Date(yr,mo,0).getDate();
  const holidays=new Set(state.monthSetup[mk]?.holidays||[]);
  const wd=[];
  for(let d=1;d<=daysInMonth;d++){const dow=new Date(yr,mo-1,d).getDay();if(dow!==5&&dow!==6&&!holidays.has(d))wd.push({d,dow});}
  return wd;
}

function buildAutoMapMulti(allocs,allWorkDays){
  const map={};
  if(!allocs.length)return map;
  // Group into calendar weeks
  const weeks=[];let cur=[];
  for(let i=0;i<allWorkDays.length;i++){
    const wd=allWorkDays[i];
    if(i>0&&wd.dow<=allWorkDays[i-1].dow){if(cur.length)weeks.push(cur);cur=[wd];}
    else cur.push(wd);
  }
  if(cur.length)weeks.push(cur);

  for(const week of weeks){
    const weekMap={};week.forEach(wd=>{weekMap[wd.d]=[];});
    const pinnedCids=new Set();
    // Pin weeklyDay clients
    for(const x of allocs){
      const raw=x.client.weeklyDay;
      if(raw===undefined||raw===null)continue;
      const wds=Array.isArray(raw)?raw:[raw];
      for(const wd of week){if(wds.includes(wd.dow)){weekMap[wd.d].push(x);pinnedCids.add(x.cid);}}
    }
    // All clients must appear ≥1 per week
    const unpinned=allocs.filter(x=>!pinnedCids.has(x.cid));
    const emptyDays=week.filter(wd=>weekMap[wd.d].length===0);
    if(unpinned.length&&emptyDays.length){
      for(let i=0;i<unpinned.length;i++)weekMap[emptyDays[i%emptyDays.length].d].push(unpinned[i]);
    } else if(unpinned.length){
      const sortedDays=[...week].sort((a,b)=>weekMap[a.d].length-weekMap[b.d].length);
      unpinned.forEach((x,i)=>weekMap[sortedDays[i%sortedDays.length].d].push(x));
    }
    // Fill still-empty days with proportional top clients
    const sorted=[...allocs].sort((a,b)=>b.h-a.h);
    week.filter(wd=>weekMap[wd.d].length===0).forEach((wd,i)=>weekMap[wd.d].push(sorted[i%sorted.length]));
    Object.entries(weekMap).forEach(([d,a])=>{map[d]=a;});
  }
  return map;
}

function clearWeeklySchedule(mk){
  if(!confirm('לנקות את הסידור השבועי לחודש זה?'))return;
  const allWorkDays=_buildMonthWorkDays(mk);
  const emps=state.employees.filter(e=>e.visible!==false);
  state.weeklySchedule[mk]={};
  emps.forEach(function(emp){
    state.weeklySchedule[mk][emp.id]={};
    allWorkDays.forEach(function(wd){state.weeklySchedule[mk][emp.id][wd.d]=[];});
  });
  saveState();renderPage();
}

function autoWeeklyDistribute(mk){
  const allWorkDays=_buildMonthWorkDays(mk);
  const activeClients=state.clients.filter(c=>c.active!==false&&c.type!=='internal');
  const emps=state.employees.filter(e=>e.visible!==false);
  if(!state.weeklySchedule[mk])state.weeklySchedule[mk]={};
  emps.forEach(emp=>{
    const monthAlloc=state.matrix[mk]?.[emp.id]||{};
    const allocs=Object.entries(monthAlloc)
      .map(([cid,h])=>({cid,h:parseFloat(h)||0,client:activeClients.find(c=>c.id===cid)}))
      .filter(x=>x.h>0&&x.client).sort((a,b)=>b.h-a.h);
    state.weeklySchedule[mk][emp.id]={};
    if(!allocs.length)return;
    const autoMap=buildAutoMapMulti(allocs,allWorkDays);
    Object.entries(autoMap).forEach(([d,assignments])=>{
      if(assignments.length)state.weeklySchedule[mk][emp.id][d]=assignments.map(x=>x.cid);
    });
  });
  saveState();renderPage();
}

      .filter(function(x){return x.h>0&&x.client;}).sort(function(a,b){return b.h-a.h;});
    const aw=_buildMonthWorkDays(mk);

  document.body.appendChild(div);

  const left=Math.max(4,Math.min(rect.left,window.innerWidth-div.offsetWidth-4));

  setTimeout(function(){document.addEventListener('click',wsHandleOutsideClick,true);},30);
}
function wsHandleOutsideClick(e){

function renderWeeklySchedule(){
  const mk=state.currentMonth;
  const ml=mkLabel(mk);
  const [,mo]=mk.split('-').map(Number);
  const allWorkDays=_buildMonthWorkDays(mk);

  const activeClients=state.clients.filter(c=>c.active!==false&&c.type!=='internal');
  const emps=state.employees.filter(e=>e.visible!==false);
  if(!emps.length) return '<div class="page-hd"><div class="page-title">סידור שבועי</div></div><div style="text-align:center;padding:60px;color:var(--muted)">אין עובדים פעילים</div>';

  // Group into calendar weeks
  const weeks=[];let cur=[];
  for(let i=0;i<allWorkDays.length;i++){
    const wd=allWorkDays[i];
    if(i>0&&wd.dow<=allWorkDays[i-1].dow){if(cur.length)weeks.push(cur);cur=[wd];}
    else cur.push(wd);
  }
  if(cur.length)weeks.push(cur);
  _weeklyWeekIdx=Math.max(0,Math.min(_weeklyWeekIdx,weeks.length-1));
  const week=weeks[_weeklyWeekIdx];

  // Build empData for this week
  const empData=emps.map(function(emp){
    const monthAlloc=state.matrix[mk]?.[emp.id]||{};
    const allocs=Object.entries(monthAlloc)
      .map(function(e){return{cid:e[0],h:parseFloat(e[1])||0,client:activeClients.find(function(c){return c.id===e[0];})};})
      .filter(function(x){return x.h>0&&x.client;}).sort(function(a,b){return b.h-a.h;});
    const autoMap=buildAutoMapMulti(allocs,allWorkDays);
    const savedMap=state.weeklySchedule[mk]?.[emp.id];
    const hasSaved=savedMap!==undefined;
    const dayMap={};
    week.forEach(function(wd){
      if(hasSaved&&savedMap[wd.d]!==undefined){
        dayMap[wd.d]=normWS(savedMap[wd.d]).map(function(cid){return{cid,client:activeClients.find(function(c){return c.id===cid;})};}).filter(function(x){return x.client;});
      } else {
        dayMap[wd.d]=autoMap[wd.d]||[];
      }
    });
    const totalH=allocs.reduce(function(s,x){return s+x.h;},0);
    const availH=Math.round(getEmpHours(emp,mk));
    return{emp,allocs,totalH,availH,dayMap};
  });

  // Week tabs
  const tabs=weeks.map(function(w,i){
    const first=w[0],last=w[w.length-1];
    const active=i===_weeklyWeekIdx;
    return '<button class="btn btn-sm '+(active?'btn-p':'btn-s')+'" onclick="_weeklyWeekIdx='+i+';renderPage()" style="'+(active?'':'opacity:0.7')+'">שבוע '+(i+1)+' <span style="font-size:10px;opacity:0.8">('+first.d+'/'+mo+'–'+last.d+'/'+mo+')</span></button>';
  }).join('');

  // Column headers for this week
  const colHeaders=week.map(function(wd){
    return '<th style="padding:8px 12px;text-align:center;background:var(--surface-2);border:1px solid var(--border);min-width:120px;white-space:nowrap"><div style="font-size:11px;color:var(--muted);margin-bottom:2px">'+_wdName[wd.dow]+'</div><div style="font-size:14px;font-weight:700;color:var(--text)">'+wd.d+'/'+mo+'</div></th>';
  }).join('');

  // Rows
  const rows=empData.map(function(ed){
    const emp=ed.emp,allocs=ed.allocs,totalH=ed.totalH,availH=ed.availH,dayMap=ed.dayMap;
    const pct=availH>0?Math.round(totalH/availH*100):0;
    const pctCol=totalH>availH?'var(--danger)':pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--muted)';
    const cells=week.map(function(wd){
      const clients=dayMap[wd.d]||[];
      const hasManual=normWS(state.weeklySchedule[mk]?.[emp.id]?.[wd.d]).length>0;
      const manualOutline=hasManual?'outline:2px solid #f59e0b;outline-offset:-2px;':'';
      // Cell content
      let inner;
      if(!clients.length){
        inner='<span style="color:var(--border);font-size:11px;user-select:none">—</span>';
      } else {
        inner='<div style="display:flex;flex-direction:column;gap:3px">'+clients.map(function(a){
          const wda=a.client.weeklyDay!=null?(Array.isArray(a.client.weeklyDay)?a.client.weeklyDay:[a.client.weeklyDay]):[];
          const isWD=wda.includes(wd.dow);
          const short=a.client.name.length>14?a.client.name.slice(0,14)+'…':a.client.name;
          return '<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:3px 7px;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+a.client.name+(isWD?' ★':'')+'">'+short+(isWD?' <span style="color:var(--primary)">★</span>':'')+'</div>';
        }).join('')+'</div>';
      }
      return '<td id="wc-'+emp.id+'-'+wd.d+'" onclick="wsShowPopover(\''+mk+'\',\''+emp.id+'\','+wd.d+',this)" style="padding:6px 8px;border:1px solid var(--border);vertical-align:top;min-width:120px;cursor:pointer;transition:background 0.1s;'+manualOutline+'" onmouseover="this.style.background=\'var(--surface-2)\'" onmouseout="this.style.background=\'\'">'+inner+'</td>';
    }).join('');
    return '<tr><td style="padding:8px 14px;border:1px solid var(--border);white-space:nowrap;position:sticky;right:0;background:var(--surface);z-index:1;border-right:2px solid var(--border)"><div style="font-weight:600;font-size:13px">'+emp.name+'</div><div style="font-size:11px;color:'+pctCol+';margin-top:2px">'+totalH+'h / '+availH+'h</div></td>'+cells+'</tr>';
  }).join('');

  return `
  <div class="page-hd flex items-c just-b" style="margin-bottom:12px">
    <div>
      <div class="page-title">סידור שבועי</div>
      <div class="page-sub">${ml} | ${emps.length} עובדים | ${weeks.length} שבועות</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-s btn-sm" onclick="clearWeeklySchedule('${mk}')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1,3 11,3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M4 3V2h4v1M2 3l.7 7.3A1 1 0 0 0 3.7 11h4.6a1 1 0 0 0 1-.7L10 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        נקה סידור
      </button>
      <button class="btn btn-s btn-sm" onclick="autoWeeklyDistribute('${mk}')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M4 6h4M6 4v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        פיזור אוטומטי
      </button>
    </div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center">
    <span style="font-size:11px;color:var(--muted);font-weight:600;margin-left:4px">שבועות:</span>
    ${tabs}
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:8px">לחץ על תא לעריכה • גבול כתום = עריכה ידנית</div>
  <div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)">
    <table style="border-collapse:collapse;width:100%">
      <thead><tr>
        <th style="padding:8px 14px;text-align:right;background:var(--surface-2);border:1px solid var(--border);font-size:12px;position:sticky;right:0;z-index:2;white-space:nowrap;border-right:2px solid var(--border)">עובד</th>
        ${colHeaders}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ===================== SETTINGS PAGE =====================
function renderSettings(){
  const months=[...(state.activeMonths||[])].sort();

  const monthRows=months.map(mk=>{
    const ml=mkLabel(mk);
    const empCount=state.employees.filter(e=>!e.hidden).length;
    const activeClients=state.clients.filter(c=>c.active!==false&&c.type!=='internal');
    const contracted=activeClients.reduce((s,c)=>s+(c.monthlyHours?.[mk]||0),0);
    const allocated=getTotalAllocated(mk);
    const util=contracted>0?Math.round(allocated/contracted*100):0;
    const utilColor=util>=85?'#3fb950':util>=60?'#d29922':'#f85149';
    const isCurrent=mk===state.currentMonth;
    const canDelete=months.length>1||!isCurrent;
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:10px 14px;text-align:center">
        <input type="checkbox" class="export-month-cb" value="${mk}" style="accent-color:var(--primary);width:15px;height:15px;cursor:pointer">
      </td>
      <td style="padding:10px 14px">
        <span style="font-weight:600;font-size:13px">${ml}</span>
        ${isCurrent?'<span style="font-size:10px;background:var(--primary);color:#fff;padding:2px 7px;border-radius:10px;margin-right:7px;vertical-align:middle">נוכחי</span>':''}
      </td>
      <td style="padding:10px 14px;text-align:center;color:var(--muted);font-size:13px">${activeClients.length}</td>
      <td style="padding:10px 14px;text-align:center;color:var(--muted);font-size:13px">${empCount}</td>
      <td style="padding:10px 14px;text-align:center;font-size:13px">${contracted?contracted+'h':'—'}</td>
      <td style="padding:10px 14px;text-align:center;font-size:13px">${allocated?allocated+'h':'—'}</td>
      <td style="padding:10px 14px;text-align:center">
        ${contracted>0
          ?`<span style="font-weight:700;font-size:13px;color:${utilColor}">${util}%</span>`
          :'<span style="color:var(--muted);font-size:12px">—</span>'}
      </td>
      <td style="padding:10px 14px;text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:6px">
          <button class="btn btn-s btn-sm" title="ייצוא חודש זה לאקסל" style="gap:5px" onclick="exportMonthsToExcel('${mk}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M6 3v5M3.5 5.5 6 8l2.5-2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            XLS
          </button>
          <button class="btn btn-s btn-sm" style="color:#f85149;border-color:rgba(248,81,73,.3);gap:5px"
            onclick="deleteMonth('${mk}')" ${canDelete?'':'disabled title="לא ניתן למחוק חודש יחיד"'}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M1.5 3h9M4.5 3V1.5h3V3M10 3l-.6 7A1 1 0 0 1 8.4 11H3.6A1 1 0 0 1 2.6 10L2 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            מחק
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="page-hd">
    <div class="page-title" style="display:flex;align-items:center;gap:9px">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 1.5v1.5M9 15v1.5M15 9h1.5M1.5 9H3M13.24 4.76l1.06-1.06M3.7 14.3l1.06-1.06M13.24 13.24l1.06 1.06M3.7 3.7l1.06 1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      הגדרות
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:24px;max-width:920px">

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-weight:700;font-size:15px">ניהול חודשים</div>
        <span style="font-size:12px;color:var(--muted);background:var(--surface-2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)">${months.length} חודשים</span>
      </div>
      ${months.length?`
      <div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--surface-2)">
              <th style="padding:9px 14px;text-align:center;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">ייצוא</th>
              <th style="padding:9px 14px;text-align:right;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">חודש</th>
              <th style="padding:9px 14px;text-align:center;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">לקוחות</th>
              <th style="padding:9px 14px;text-align:center;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">עובדים</th>
              <th style="padding:9px 14px;text-align:center;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">שעות חוזיות</th>

              <th style="padding:9px 14px;text-align:center;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">ניצולת</th>

            </tr>

          <tbody>${monthRows}</tbody>
        </table>
      </div>`
      :'<div style="text-align:center;padding:40px;color:var(--muted)">אין חודשים במערכת</div>'}
    </div>

    <div class="card">
      <div style="font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="1.5" width="12" height="13" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 5.5h6M5 8h6M5 10.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        ייצוא דוח לאקסל
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">
        סמני חודשים בטבלה למעלה ולחצי ייצוא. הקובץ יכלול 4 גיליונות:<br>
        <span style="color:var(--text)">סיכום חודשי · פירוט עובדים · פירוט לקוחות · מטריצת הקצאות</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <button class="btn btn-s btn-sm" onclick="document.querySelectorAll('.export-month-cb').forEach(cb=>cb.checked=true)">
          בחר הכל
        </button>
        <button class="btn btn-s btn-sm" onclick="document.querySelectorAll('.export-month-cb').forEach(cb=>cb.checked=false)">
          בטל הכל
        </button>
        <div style="width:1px;height:20px;background:var(--border)"></div>
        <button class="btn btn-p" onclick="exportMonthsToExcel()" style="gap:7px">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1.5" y="1.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7 4v6M4.5 7.5 7 10l2.5-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ייצוא לאקסל
        </button>
      </div>
    </div>

  </div>`;
}

function deleteMonth(mk){
  const ml=mkLabel(mk);
  if(!confirm('למחוק את חודש '+ml+'?\n\nכל הנתונים של החודש הזה — הקצאות, הגדרות וחופשות — יימחקו לצמיתות.'))return;
  state.activeMonths=(state.activeMonths||[]).filter(m=>m!==mk);
  delete (state.matrix||{})[mk];
  if(state.monthSetup)delete state.monthSetup[mk];
  if(state.vacations)delete state.vacations[mk];
  state.employees.forEach(e=>{if(e.monthlyHours)delete e.monthlyHours[mk];});
  state.clients.forEach(c=>{
    if(c.monthlyHours)delete c.monthlyHours[mk];
    if(c.billedHours)delete c.billedHours[mk];
  });
  if(state.currentMonth===mk){
    const remaining=state.activeMonths;
    state.currentMonth=remaining.length?remaining[remaining.length-1]:'';
  }
  saveState();
  initMonthSelect();
  navigate('settings');
}

function exportMonthsToExcel(forceMks){
  if(typeof XLSX==='undefined'){alert('ספריית האקסל עדיין בטעינה, נסי שוב עוד רגע');return;}
  let mks;
  if(forceMks){
    mks=Array.isArray(forceMks)?forceMks:[forceMks];
  } else {
    const cbs=document.querySelectorAll('.export-month-cb:checked');
    mks=[...cbs].map(cb=>cb.value);
    if(!mks.length){alert('יש לסמן לפחות חודש אחד לייצוא');return;}
  }

  const wb=XLSX.utils.book_new();
  const typeHe={retainer:'ריטיינר',project:'פרויקט',internal:'פנימי'};

  // ── Sheet 1: Monthly summary ──
  const sum=[['חודש','לקוחות פעילים','עובדים פעילים','שעות חוזיות','שעות מוקצות','ניצולת %','ימי עבודה']];
  mks.forEach(mk=>{
    const ac=state.clients.filter(c=>c.active!==false&&c.type!=='internal');
    const ae=state.employees.filter(e=>!e.hidden);
    const contracted=ac.reduce((s,c)=>s+(c.monthlyHours?.[mk]||0),0);
    const allocated=getTotalAllocated(mk);
    const util=contracted>0?Math.round(allocated/contracted*100):0;
    const wd=state.monthSetup?.[mk]?.workDays??calcMonthWorkDays(mk).effective;
    sum.push([mkLabel(mk),ac.length,ae.length,contracted,allocated,contracted>0?util+'%':'—',wd]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'סיכום חודשי');

  // ── Sheet 2: Employees detail ──
  const empRows=[['חודש','עובד','תפקיד','שעות קיבולת','שעות מוקצות','ניצולת %','ימי חופש','לקוחות פעילים']];
  mks.forEach(mk=>{
    state.employees.filter(e=>!e.hidden).forEach(e=>{
      const cap=getEmpHours(e,mk);
      const alloc=getEmpAllocated(e.id,mk);
      const util=cap>0?Math.round(alloc/cap*100):0;
      const vac=state.vacations?.[mk]?.[e.id]||0;
      const clients=getEmpActiveClients(e.id,mk);
      empRows.push([mkLabel(mk),e.name,e.role||'',cap,alloc,cap>0?util+'%':'—',vac,clients]);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(empRows),'פירוט עובדים');

  // ── Sheet 3: Clients detail ──
  const clientRows=[['חודש','לקוח','סוג','שעות חוזיות','שעות מוקצות','ניצולת %']];
  mks.forEach(mk=>{
    state.clients.filter(c=>c.active!==false).forEach(c=>{
      const contracted=c.monthlyHours?.[mk]||0;
      const allocated=Object.values(state.matrix[mk]||{}).reduce((s,ed)=>s+(parseFloat(ed[c.id])||0),0);
      const util=contracted>0?Math.round(allocated/contracted*100):0;
      clientRows.push([mkLabel(mk),c.name,typeHe[c.type]||c.type,contracted||'—',allocated||'—',contracted>0?util+'%':'—']);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(clientRows),'פירוט לקוחות');

  // ── Sheet 4: Allocation matrix ──
  const allocRows=[['חודש','עובד','לקוח','שעות מוקצות']];
  mks.forEach(mk=>{
    Object.entries(state.matrix[mk]||{}).forEach(([eid,cMap])=>{
      const emp=state.employees.find(e=>e.id===eid);
      if(!emp)return;
      Object.entries(cMap).forEach(([cid,hrs])=>{
        const h=parseFloat(hrs)||0;
        if(!h)return;
        const client=state.clients.find(c=>c.id===cid);
        allocRows.push([mkLabel(mk),emp.name,client?.name||cid,h]);
      });
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(allocRows),'מטריצת הקצאות');

  // style column widths (RTL-friendly)
  [sum,empRows,clientRows,allocRows].forEach((data,si)=>{
    const ws=wb.Sheets[wb.SheetNames[si]];
    if(!ws['!cols'])ws['!cols']=[];
    const maxW=data[0].map((_,ci)=>Math.min(30,Math.max(...data.map(r=>String(r[ci]??'').length))+2));
    ws['!cols']=maxW.map(w=>({wch:w}));
  });

  const fname=mks.length===1
    ?'workforce-'+mks[0]+'.xlsx'
    :'workforce-report-'+new Date().toISOString().slice(0,10)+'.xlsx';
  XLSX.writeFile(wb,fname);
}

function init(){loadState();initMonthSelect();navigate('overview');}
init();
</script>
